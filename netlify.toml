[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@aws-sdk/client-s3", "@aws-sdk/s3-request-presigner", "@supabase/supabase-js"]

# SPA-style fallback so all non-function paths resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
