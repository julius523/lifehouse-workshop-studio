      s("why", { hook: "Kids don't need perfect parents. They need parents who own their mistakes — research is clear on this.", body: "If you're a parent in recovery, in reentry, in any kind of rebuild — you've made mistakes with your kids. Today: how to repair, how to show up now, and how to stop the cycle that may have shaped you." }),
      s("objectives", { items: ["Name 1-3 ruptures with your kid(s) you want to repair", "Practice the 4-part repair script", "Identify the parenting pattern from YOUR childhood you want to break", "Set ONE weekly ritual with your kid(s)"] }),
      s("concept", { title: "Rupture + Repair > Perfect", body: "Dr. Ed Tronick's research: babies and kids don't need attuned parents 100% of the time — they need parents who notice ruptures and repair them. 30% repair rate is enough for secure attachment. The repair IS the parenting." }),
      s("deepdive", { title: "What repair sounds like", items: ["**Specific:** 'I yelled when you spilled the milk. That wasn't your fault.'", "**Owning impact, not just intent:** 'I scared you. I'm sorry.' (Not 'I didn't mean to.')", "**Age-appropriate:** little kids need short. Teens need real. Adult kids need humility.", "**No expecting forgiveness on your timeline.** They get to be mad as long as they need.", "**Action change:** 'Here's what I'll do differently.' Then DO it."] }),
      s("case", { name: "Reggie, 38, dad to 14-year-old daughter", scenario: "Reggie missed 4 years of his daughter Nia's life — incarcerated. Came home thinking he'd 'make it up.' She was furious and silent. We worked the repair script. He didn't try to fix it in one talk. Over 6 months: 'I missed your 10th birthday. I know that hurt. I won't lie to you about why.' She started talking. Year two: she calls him for advice. Repair is slow. It works." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What's a rupture you'd repair if you knew how?", "What did YOUR parents never repair with you?", "What's one ritual (weekly call, breakfast, walk) you can offer this week?"] }),
      s("activity", { title: "Activity: Write the Repair Letter (30 min)", instructions: "Pick ONE rupture with ONE kid. Write the repair: (1) name what happened specifically, (2) own the impact, (3) skip the excuses, (4) state what's different now. Read to your CHW. You don't have to send it today — but you can." }),

      s("outcome", { title: "You walk out today with…", items: ["One repair ready to deliver", "A weekly ritual scheduled", "Permission to be a learning parent, not a perfect one", "A model for next time you mess up (because you will)"] }),

      s("concept", { title: "Anger is data, not destiny", body: "Anger tells you: a boundary was crossed, a value was disrespected, a need is unmet. The feeling is information. The choice is in the response. Skilled people feel it fully and respond wisely. That's it." }),
      s("deepdive", { title: "The skill stack", items: ["**Body signals first:** jaw clench, shoulder tightness, heat in chest — name them BEFORE the explosion", "**90-second rule:** the chemical wave of anger lasts ~90 seconds. Ride it without acting", "**Pause phrases:** 'I need a minute.' 'Let me think before I respond.' 'I'm not okay right now — let's pause'", "**Tactical retreat:** physically leave for 20 minutes. Drink water. Walk. Come back", "**When anger = action:** injustice, abuse, rights violations. Channel into advocacy, legal action, organized response"] }),

  "conflict-mediation": {

    duration: "2 hours",
    slides: [

      s("why", { hook: "Most conflicts escalate because nobody slows them down. The skilled person in the room can change everything.", body: "Today: how to mediate between two parties (family, work, neighbors). The structure that works. Common traps. And how to know when to mediate vs when to walk away." }),
      s("objectives", { items: ["Run a structured mediation conversation", "Use 3 de-escalation moves", "Reframe positions to interests", "Know when professional mediation is needed"] }),
      s("concept", { title: "Positions vs interests", body: "What people SAY they want (positions) is different from what they NEED (interests). 'I want the car!' (position) often means 'I need to feel respected in this divorce' (interest). Mediation works at the interest level." }),
      s("deepdive", { title: "The mediation move-set", items: ["**Set ground rules:** one talks at a time, no name-calling, breaks allowed", "**Each side speaks uninterrupted** (3-5 min each) — the OTHER side listens", "**You summarize back:** 'What I'm hearing is X — got it right?' Both sides nod before moving on", "**Reframe to interests:** 'sounds like you both need to feel respected — different versions of the same need'", "**Generate options:** brainstorm 5+ solutions before evaluating any"] }),
      s("case", { name: "Tasha, 41, mediated her parents' fight about the house", scenario: "Tasha's parents divorcing after 35 years. Fighting about the family home. Tasha applied mediation: each parent talked uninterrupted (5 min each, brutal but they did it). Tasha summarized — Mom needed financial security, Dad needed his identity tied to the house. Reframed: both needed continuity. Generated 8 options. They settled on Mom keeping house, Dad getting larger retirement share. No lawyers. No years of fighting. The structure unstuck them." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What conflict in your life is stuck?", "What would the OTHER side say their interest is?", "Who do you need to mediate WITH (not for)?"] }),
      s("activity", { title: "Activity: Mediation Roleplay (35 min)", instructions: "Triads: one mediator, two parties with a (real or fictional) conflict. Run the structure: ground rules, uninterrupted speaking, summary, interest reframe, options. 15 min. Then debrief with whole group." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Specific conflict you'd apply this to", "Each party's interests (your guess)", "Mediation invitation script", "Backup if mediation fails (legal, walking away)"] }),
      s("outcome", { title: "You walk out today with…", items: ["A repeatable mediation structure", "Position-vs-interest framework", "A real conflict to apply it to", "Knowledge of when to escalate"] }),
      s("resources", { items: ["Sacramento Mediation Center (free/low-cost): sacmediation.org / (916) 441-7811", "Difficult Conversations (Stone et al.) — book", "Restorative justice training (free): cdcr.ca.gov programs", "Family law mediation: free at most county courts"] })
    ]

      s("deepdive", { title: "Phase-2 priorities", items: ["**Career trajectory:** the first job is a launching pad, not a destination. Cert programs, promotions, network", "**Relationship repair:** kids, family, ex-partners — slow and patient. Therapy helps. Time helps", "**PO management:** show up early, document everything, treat them like a customer to keep happy", "**Expungement:** start the paperwork at 12 months out for eligible offenses (PC 1203.4)", "**Identity work:** who are you NOT defined by the past? Therapy, faith, mentorship, art, mission"] }),

// Inline markdown bold support: "**foo** bar" -> JSX
function renderInline(text) {
  if (!text) return null;
  const parts = String(text).split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => {
    if (p.startsWith("**") && p.endsWith("**")) {
      return <strong key={i} className="font-semibold text-stone-900">{p.slice(2, -2)}</strong>;
    }
    return <React.Fragment key={i}>{p}</React.Fragment>;
  });
}

// Storage hook
function useStorage(key, fallback) {
  const auth = useAuth();
  const [val, setVal] = useState(fallback);
  const [loaded, setLoaded] = useState(false);

  // Load from Supabase on mount + subscribe to changes
  useEffect(() => {
    if (!auth?.supabase) {
      // No supabase — use localStorage
      try {
        const raw = localStorage.getItem(key);
        if (raw) setVal(JSON.parse(raw));
      } catch (e) {}
      setLoaded(true);
      return;
    }
    let live = true;

    const load = async () => {
      try {
        const { data } = await auth.supabase
          .from("app_state")
          .select("value, updated_at")
          .eq("key", key)
          .maybeSingle();
        if (live) {
          if (data) setVal(data.value);
          else setVal(fallback);
          setLoaded(true);
        }
      } catch (e) {
        console.warn("storage load failed", e);
        if (live) setLoaded(true);
      }
    };
    load();

    // Realtime subscription so updates from other team members show up live
    const channel = auth.supabase
      .channel(`app_state:${key}`)
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "app_state", filter: `key=eq.${key}` },
        (payload) => {
          if (!live) return;
          // Skip if we made this change ourselves (avoid stomping local state mid-edit)
          const newRow = payload.new;
          if (newRow && newRow.value !== undefined) {
            const myId = auth.session?.user?.id;
            if (newRow.updated_by !== myId) {
              setVal(newRow.value);
            }
          }
        }
      )
      .subscribe();

    return () => {
      live = false;
      auth.supabase.removeChannel(channel);
    };
  }, [key, auth?.session?.user?.id]);

  // Update both local state + Supabase (debounced via simple ref)
  const saveTimerRef = useRef(null);
  const update = (next) => {
    setVal(next);
    if (!auth?.supabase) {
      try { localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
      return;
    }
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      try {
        await auth.supabase.from("app_state").upsert({
          key,
          value: next,
          updated_by: auth.session?.user?.id,
          updated_at: new Date().toISOString()
        }, { onConflict: "key" });
      } catch (e) {
        console.warn("storage save failed", e);
      }
    }, 400);
  };

  return [val, update, loaded];
}

// Detect & normalize video URL into an embeddable form.
// Returns: { kind: "youtube"|"vimeo"|"file"|"unknown", embedUrl, posterUrl?, originalUrl }
function parseVideoUrl(raw) {
  if (!raw || typeof raw !== "string") return { kind: "unknown", embedUrl: "", originalUrl: "" };
  const url = raw.trim();
  // YouTube
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  if (m) {
    const id = m[1];
    return {
      kind: "youtube",
      embedUrl: `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`,
      posterUrl: `https://img.youtube.com/vi/${id}/maxresdefault.jpg`,
      originalUrl: url
    };
  }
  // Vimeo
  m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (m) {
    return {
      kind: "vimeo",
      embedUrl: `https://player.vimeo.com/video/${m[1]}?title=0&byline=0&portrait=0`,
      originalUrl: url
    };
  }
  // Direct video file (mp4 / webm / mov / m4v) or a Spaces URL
  if (/\.(mp4|webm|mov|m4v|ogv)(\?|$)/i.test(url) || url.includes("digitaloceanspaces.com")) {
    return { kind: "file", embedUrl: url, originalUrl: url };
  }
  return { kind: "unknown", embedUrl: url, originalUrl: url };
}

// Collect all image attributions used in a deck (for resources slide auto-credits)
function collectDeckCredits(deck) {
  const credits = [];
  const seen = new Set();
  (deck?.slides || []).forEach(s => {
    const imgs = [];
    if (s.image) imgs.push(s.image);
    if (s.images && Array.isArray(s.images)) imgs.push(...s.images);
    imgs.forEach(img => {
      if (!img || !img.id) return;
      if (seen.has(img.id)) return;
      seen.add(img.id);
      credits.push(img);
    });
  });
  return credits;
}

// Normalize a list item — handles both legacy string items and new {text, level} objects.
// Returns {text, level} where level is the indent depth (0 = top-level bullet, 1 = sub-bullet, etc.).
function normalizeItem(item) {
  if (typeof item === "string") return { text: item, level: 0 };
  if (item && typeof item === "object") return { text: item.text || "", level: Math.max(0, Math.min(3, item.level || 0)) };
  return { text: "", level: 0 };
}
// Get just the displayable text from an item (for renderers that don't support indenting yet)
function itemText(item) {
  return typeof item === "string" ? item : (item?.text || "");
}
// Get level (0 if string)
function itemLevel(item) {
  return typeof item === "string" ? 0 : Math.max(0, Math.min(3, item?.level || 0));
}

  CATEGORIES.forEach(c => { grouped[c.id] = []; });
  Object.entries(allDecks).forEach(([id, d]) => {
    const cat = d.cat || d.category;
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ id, ...d });
  });
  customDecks.forEach(cd => {
    if (!grouped[cd.cat]) grouped[cd.cat] = [];
    grouped[cd.cat].push({ ...cd, isCustom: true });
  });

  const q = search.trim().toLowerCase();
  const filterFn = q
    ? (d) => (d.title || "").toLowerCase().includes(q) || (d.tagline || "").toLowerCase().includes(q)
    : () => true;

  const visibleCats = CATEGORIES.filter(c => grouped[c.id].some(filterFn));

  return (
    <div className="px-8 lg:px-16 py-12 max-w-7xl mx-auto">
      {/* HERO */}
      <div className="relative mb-16">
        <div className="absolute -top-8 -left-4 w-72 h-72 rounded-full opacity-20 blur-3xl pointer-events-none" style={{ background: BRAND.green }} />
        <div className="absolute -top-12 right-12 w-80 h-80 rounded-full opacity-15 blur-3xl pointer-events-none" style={{ background: BRAND.purple }} />
        <div className="relative">
          <div className="text-xs uppercase tracking-[0.3em] mb-4" style={{ color: BRAND.purple, fontWeight: 600 }}>
            Community Health Worker · Workshop Studio
          </div>
          <h1 style={{ fontFamily: "Fraunces, Georgia, serif", lineHeight: 0.95, letterSpacing: "-0.03em" }} className="text-6xl md:text-7xl font-medium text-stone-900 mb-6">
            Workshops that<br />
            <span className="italic" style={{ color: BRAND.purpleDeep }}>change a life</span><br />
            in two hours.
          </h1>
          <p style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-xl md:text-2xl text-stone-600 max-w-2xl leading-snug italic">
            One hour presented. One hour, one-on-one. Real outcomes the client walks home with.
          </p>
        </div>
      </div>

      {/* SEARCH + ACTIONS */}
      <div className="flex flex-col md:flex-row gap-4 mb-12 items-stretch md:items-center">
        <div className="relative flex-1">
          <Search size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" />
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search 100+ workshops…"
            className="w-full pl-12 pr-4 py-3.5 bg-white rounded-full text-stone-900 placeholder:text-stone-400 outline-none border border-stone-200 focus:border-stone-400 transition"
            style={{ fontFamily: "Manrope, sans-serif" }}
          />
        </div>
        <button
          onClick={onNewCustom}
          className="px-6 py-3.5 rounded-full text-white font-semibold flex items-center justify-center gap-2 hover:opacity-90 transition shadow-sm"
          style={{ background: BRAND.purpleDeep, fontFamily: "Manrope, sans-serif" }}
        >
          <Sparkles size={16} /> New custom workshop
        </button>
      </div>

      {/* CATEGORIES */}
      <div className="space-y-16">
        {visibleCats.map(cat => {
          const items = grouped[cat.id].filter(filterFn);
          if (items.length === 0) return null;
          const Icon = cat.icon;
          return (
            <section key={cat.id}>
              <div className="flex items-baseline gap-4 mb-6 pb-4 border-b border-stone-200">
                <div
                  className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
                  style={{ background: `${cat.accent}15`, color: cat.accent }}
                >
                  <Icon size={20} />
                </div>
                <h2 style={{ fontFamily: "Fraunces, Georgia, serif", color: BRAND.ink }} className="text-3xl font-medium tracking-tight">
                  {cat.label}
                </h2>
                <span className="text-sm text-stone-400 ml-auto" style={{ fontFamily: "Manrope, sans-serif" }}>
                  {items.length} workshop{items.length !== 1 ? "s" : ""}
                </span>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {items.map(d => (
                  <button
                    key={d.id}
                    onClick={() => onOpen(d.id)}
                    className="group text-left p-5 bg-white rounded-2xl border border-stone-200 hover:border-stone-400 transition relative overflow-hidden"
                  >
                    <div
                      className="absolute left-0 top-0 bottom-0 w-1 transition-all group-hover:w-1.5"
                      style={{ background: cat.accent }}
                    />
                    <div className="pl-3">
                      <div className="flex items-center gap-2 mb-2">
                        {d.isCustom && <Pill color={BRAND.amber} light>Custom</Pill>}
                        <span className="text-[10px] font-semibold tracking-widest uppercase text-stone-400" style={{ fontFamily: "Manrope, sans-serif" }}>
                          {(d.slides || []).length} slides
                        </span>
                      </div>
                      <h3 style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-lg font-medium text-stone-900 leading-tight mb-1">
                        {d.title}
                      </h3>
                      {d.tagline && (
                        <p className="text-sm text-stone-500 leading-snug" style={{ fontFamily: "Manrope, sans-serif" }}>
                          {d.tagline}
                        </p>
                      )}
                      <div className="flex items-center gap-1 mt-3 text-xs font-semibold opacity-0 group-hover:opacity-100 transition" style={{ color: cat.accent, fontFamily: "Manrope, sans-serif" }}>
                        Open <ArrowRight size={12} />
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            </section>
          );
        })}
      </div>
    </div>
  );
}

// =====================================================================
// SLIDE RENDERERS (presentation + preview)
// =====================================================================

function SlideRender({ slide, deck, presenting, bulletReveal = null }) {
  if (!slide) return null;
  const k = slide.kind;
  // bulletReveal === null means "show all" (default).
  // Otherwise it's the count of bullets currently revealed (0..N).
  const isVisible = (i) => bulletReveal === null || i < bulletReveal;

  // Resolve theme. Falls back to default if deck has no theme set.
  const theme = getTheme(deck?.theme);
  // Theme color map for renderer use (keeps existing BRAND.* names valid via mapping below)
  const T = {
    purple: theme.accent,
    purpleDeep: theme.accentDeep,
    green: theme.accent2,
    greenDeep: theme.accent2,
    amber: theme.accent3,
    cream: theme.bg,
    paper: theme.paper,
    ink: theme.ink,
    inkSoft: theme.inkSoft,
    border: theme.border,
    eyebrow: theme.eyebrow,
    surface: theme.surface,
    titleFont: theme.titleFont,
    bodyFont: theme.bodyFont
  };
  // Style helpers driven by theme, used in lieu of "text-stone-900" so dark themes work
  const ssTitle = { color: T.ink, fontFamily: T.titleFont };
  const ssBody = { color: T.inkSoft, fontFamily: T.bodyFont };
  const ssEyebrow = { color: T.eyebrow };

  // Helper: render a side-image panel for any slide that has slide.image.
  // Returns null if no image, otherwise an absolutely-positioned panel in upper right.
  const sideImage = slide.image && k !== "image" && k !== "title" && k !== "video" ? (
    <div className="absolute top-6 right-6 w-32 sm:w-44 md:w-56 z-10 pointer-events-none">
      <img
        src={slide.image.thumbUrl || slide.image.previewUrl}
        alt={slide.image.alt || ""}
        className="w-full h-auto object-cover rounded-xl shadow-lg"
        style={{ aspectRatio: "4/3", outline: `1px solid ${T.border}` }}
        loading="lazy"
      />
    </div>
  ) : null;

  if (k === "title") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {slide.image && (
          <div className="absolute inset-0 overflow-hidden">
            <img src={slide.image.fullUrl || slide.image.previewUrl} alt={slide.image.alt || ""} className="w-full h-full object-cover" loading="lazy" />
            <div className="absolute inset-0" style={{ background: "linear-gradient(115deg, rgba(255,252,245,0.97) 0%, rgba(255,252,245,0.75) 55%, rgba(255,252,245,0.4) 100%)" }} />
          </div>
        )}
        <div className="relative">
          <div className="text-xs uppercase tracking-[0.3em] mb-6" style={{ color: T.purple, fontWeight: 600 }}>
            Life House Reentry · Workshop
          </div>
          <h1 style={{ fontFamily: "Fraunces, Georgia, serif", lineHeight: 0.95, letterSpacing: "-0.03em" }} className={`${presenting ? "text-7xl md:text-8xl" : "text-5xl"} font-medium text-stone-900 mb-6`}>
            {slide.title}
          </h1>
          {slide.tagline && (
            <p style={{ fontFamily: "Fraunces, Georgia, serif", color: T.purpleDeep }} className={`${presenting ? "text-3xl" : "text-xl"} italic max-w-3xl leading-snug`}>
              {slide.tagline}
            </p>
          )}
          <div className="mt-12 flex items-center gap-4">
            <div className="h-px flex-1" style={{ background: T.border }} />
            <Logo size="sm" />
          </div>
        </div>
      </div>
    );
  }

  if (k === "why") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.green }}>Why this matters</div>
        <div className="space-y-8 max-w-4xl">
          <p style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 leading-tight`}>
            "{slide.hook}"
          </p>
          <p style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? "text-2xl" : "text-lg"} text-stone-600 leading-relaxed`}>
            {slide.body}
          </p>
        </div>
      </div>
    );
  }

  if (k === "objectives") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.purple }}>By the end of this hour</div>
        <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-10 leading-tight`}>
          You will…
        </h2>
        <ul className="space-y-5 max-w-3xl">
          {(slide.items || []).map((it, i) => {
            const lvl = itemLevel(it);
            const txt = itemText(it);
            return (
              <li key={i} className="flex gap-5 items-start" style={{ marginLeft: lvl * 32 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                {lvl === 0 ? (
                  <span style={{ background: T.green, fontFamily: "Fraunces, Georgia, serif" }} className={`shrink-0 ${presenting ? "w-12 h-12 text-2xl" : "w-9 h-9 text-base"} rounded-full flex items-center justify-center text-white font-medium`}>
                    {i + 1}
                  </span>
                ) : (
                  <span className={`shrink-0 mt-3 ${presenting ? "w-3 h-3" : "w-2 h-2"} rounded-full`} style={{ background: T.green, opacity: 1 - lvl * 0.2 }} />
                )}
                <span style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (lvl > 0 ? "text-xl" : "text-2xl") : (lvl > 0 ? "text-base" : "text-lg")} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug pt-1`}>
                  {renderInline(txt)}
                </span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  }

  if (k === "concept") {
    return (
      <div className={`flex h-full ${slide.image ? "" : "flex-col justify-center"} px-8 gap-8`}>
        <div className={`flex flex-col justify-center ${slide.image ? "flex-1 min-w-0" : "w-full"}`}>
          <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.purple }}>Concept</div>
          {slide.title && (
            <h2 style={{ fontFamily: "Fraunces, Georgia, serif", letterSpacing: "-0.02em" }} className={`${presenting ? (slide.image ? "text-5xl" : "text-6xl") : (slide.image ? "text-3xl" : "text-4xl")} font-medium text-stone-900 mb-8 leading-tight max-w-4xl`}>
              {slide.title}
            </h2>
          )}
          <p style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (slide.image ? "text-xl" : "text-2xl") : "text-lg"} text-stone-700 leading-relaxed max-w-4xl`}>
            {renderInline(slide.body)}
          </p>
        </div>
        {slide.image && (
          <div className="flex-shrink-0 w-2/5 max-w-md flex items-center">
            <img src={slide.image.previewUrl || slide.image.fullUrl} alt={slide.image.alt || ""} className="w-full max-h-[80%] object-cover rounded-2xl shadow-md" loading="lazy" />
          </div>
        )}
      </div>
    );
  }

  if (k === "deepdive") {
    return (
      <div className="flex flex-col justify-center h-full px-8 py-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.purple }}>Deep dive</div>
        {slide.title && (
          <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-8 leading-tight`}>
            {slide.title}
          </h2>
        )}
        <ul className="space-y-3 max-w-4xl">
          {(slide.items || []).map((it, i) => {
            const lvl = itemLevel(it);
            const txt = itemText(it);
            return (
              <li key={i} className="flex gap-3 items-start" style={{ marginLeft: lvl * 28 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                <span className={`shrink-0 mt-2 ${lvl === 0 ? "w-1.5 h-1.5 rounded-full" : "w-2 h-px mt-3"}`} style={{ background: T.green, opacity: 1 - lvl * 0.25 }} />
                <span style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (lvl > 0 ? "text-lg" : "text-xl") : (lvl > 0 ? "text-sm" : "text-base")} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug`}>
                  {renderInline(txt)}
                </span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  }

  if (k === "case") {
    return (
      <div className={`flex h-full px-8 py-8 gap-8 ${slide.image ? "" : "flex-col justify-center"}`}>
        <div className={`flex flex-col justify-center ${slide.image ? "flex-1 min-w-0" : "w-full"}`}>
          <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.amber }}>Case study</div>
          <div className="bg-white rounded-3xl p-10 max-w-4xl border-l-4" style={{ borderColor: T.amber, background: T.paper }}>
            <div style={{ fontFamily: "Fraunces, Georgia, serif", color: T.purpleDeep }} className={`${presenting ? "text-3xl" : "text-2xl"} italic mb-4`}>
              {slide.name}
            </div>
            <p style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? "text-xl" : "text-base"} text-stone-700 leading-relaxed`}>
              {slide.scenario}
            </p>
          </div>
        </div>
        {slide.image && (
          <div className="flex-shrink-0 w-2/5 max-w-md flex items-center">
            <img src={slide.image.previewUrl || slide.image.fullUrl} alt={slide.image.alt || ""} className="w-full max-h-[80%] object-cover rounded-2xl shadow-md" loading="lazy" />
          </div>
        )}
      </div>
    );
  }

  if (k === "discussion") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.green }}>Discussion</div>
        <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-10 italic`}>
          {slide.prompt}
        </h2>
        <ul className="space-y-6 max-w-3xl">
          {(slide.questions || []).map((q, i) => {
            const lvl = itemLevel(q);
            const txt = itemText(q);
            return (
              <li key={i} className="flex gap-5 items-start" style={{ marginLeft: lvl * 32 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                {lvl === 0 ? (
                  <span style={{ fontFamily: "Fraunces, Georgia, serif", color: T.green }} className={`${presenting ? "text-4xl" : "text-2xl"} font-medium leading-none`}>
                    Q{i + 1}.
                  </span>
                ) : (
                  <span className="shrink-0 mt-3 w-2 h-px" style={{ background: T.green, opacity: 1 - lvl * 0.25 }} />
                )}
                <span style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? (lvl > 0 ? "text-2xl" : "text-3xl") : (lvl > 0 ? "text-lg" : "text-xl")} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug italic`}>
                  {txt}
                </span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  }

  if (k === "activity") {
    return (
      <div className={`flex h-full px-8 gap-8 ${slide.image ? "" : "flex-col justify-center"}`}>
        <div className={`flex flex-col justify-center ${slide.image ? "flex-1 min-w-0" : "w-full"}`}>
          <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.purple }}>Activity — together</div>
          <h2 style={{ fontFamily: "Fraunces, Georgia, serif", letterSpacing: "-0.02em" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-8 leading-tight`}>
            {slide.title}
          </h2>
          <div className="rounded-3xl p-10 max-w-4xl" style={{ background: `${T.purple}10`, border: `1px solid ${T.purple}25` }}>
            <p style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (slide.image ? "text-xl" : "text-2xl") : "text-lg"} text-stone-800 leading-relaxed`}>
              {slide.instructions}
            </p>
          </div>
        </div>
        {slide.image && (
          <div className="flex-shrink-0 w-2/5 max-w-md flex items-center">
            <img src={slide.image.previewUrl || slide.image.fullUrl} alt={slide.image.alt || ""} className="w-full max-h-[80%] object-cover rounded-2xl shadow-md" loading="lazy" />
          </div>
        )}
      </div>
    );
  }

  if (k === "image") {
    if (!slide.image) {
      return (
        <div className="flex flex-col items-center justify-center h-full px-8 text-stone-400">
          <Image size={48} className="mb-4 opacity-40" />
          <p className="text-sm" style={{ fontFamily: "Manrope, sans-serif" }}>No image yet — edit this slide to add one.</p>
        </div>
      );
    }
    return (
      <div className="flex flex-col items-center justify-center h-full px-8 py-6 gap-4 bg-stone-900">
        <div className="flex-1 w-full flex items-center justify-center min-h-0">
          <img src={slide.image.fullUrl || slide.image.previewUrl} alt={slide.image.alt || slide.caption || ""} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl" />
        </div>
        {slide.caption && (
          <div style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-2xl" : "text-lg"} text-white text-center italic max-w-3xl`}>
            {slide.caption}
          </div>
        )}
      </div>
    );
  }

  if (k === "video") {
    const v = parseVideoUrl(slide.videoUrl || "");
    if (!slide.videoUrl || v.kind === "unknown") {
      return (
        <div className="flex flex-col items-center justify-center h-full px-8 text-stone-400">
          <Video size={48} className="mb-4 opacity-40" />
          <p className="text-sm" style={{ fontFamily: "Manrope, sans-serif" }}>{slide.videoUrl ? "Couldn't recognize that video URL." : "No video yet — edit this slide to add one."}</p>
        </div>
      );
    }
    return (
      <div className="flex flex-col items-center justify-center h-full px-6 py-5 gap-3 bg-stone-900">
        <div className="flex-1 w-full flex items-center justify-center min-h-0">
          {v.kind === "file" ? (
            <video src={v.embedUrl} controls playsInline className="max-w-full max-h-full rounded-xl shadow-2xl" style={{ aspectRatio: "16/9" }} />
          ) : (
            <iframe
              src={v.embedUrl}
              title={slide.caption || "Workshop video"}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
              className="rounded-xl shadow-2xl"
              style={{ width: "100%", height: "100%", aspectRatio: "16/9", border: 0, maxHeight: "100%" }}
            />
          )}
        </div>
        {slide.caption && (
          <div style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-xl" : "text-base"} text-white text-center italic max-w-3xl`}>
            {slide.caption}
          </div>
        )}
      </div>
    );
  }

  if (k === "worksheet") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.green }}>1-on-1 hour</div>
        <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-10 leading-tight`}>
          {slide.title}
        </h2>
        <ol className="space-y-4 max-w-3xl">
          {(slide.items || []).map((it, i) => {
            const lvl = itemLevel(it);
            const txt = itemText(it);
            return (
              <li key={i} className="flex gap-5 items-start" style={{ marginLeft: lvl * 28 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                {lvl === 0 ? (
                  <span style={{ background: T.green, color: "white", fontFamily: "Manrope, sans-serif" }} className={`shrink-0 ${presenting ? "w-10 h-10 text-lg" : "w-8 h-8 text-sm"} rounded-md flex items-center justify-center font-semibold`}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                ) : (
                  <span className="shrink-0 mt-3 w-2 h-px" style={{ background: T.green, opacity: 1 - lvl * 0.25 }} />
                )}
                <span style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (lvl > 0 ? "text-lg" : "text-xl") : (lvl > 0 ? "text-sm" : "text-base")} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug pt-1 whitespace-pre-wrap`}>
                  {renderInline(txt)}
                </span>
              </li>
            );
          })}
        </ol>
      </div>
    );
  }

  if (k === "outcome") {
    return (
      <div className="flex flex-col justify-center h-full px-8 relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.green }}>The outcome</div>
        <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-10 leading-tight italic`}>
          {slide.title}
        </h2>
        <ul className="space-y-4 max-w-3xl">
          {(slide.items || []).map((it, i) => {
            const lvl = itemLevel(it);
            const txt = itemText(it);
            return (
              <li key={i} className="flex gap-4 items-start" style={{ marginLeft: lvl * 28 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                {lvl === 0 ? (
                  <Check size={presenting ? 28 : 20} className="shrink-0 mt-1" style={{ color: T.green }} />
                ) : (
                  <span className="shrink-0 mt-3 w-2 h-px" style={{ background: T.green, opacity: 1 - lvl * 0.25 }} />
                )}
                <span style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? (lvl > 0 ? "text-xl" : "text-2xl") : (lvl > 0 ? "text-base" : "text-lg")} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug`}>
                  {renderInline(txt)}
                </span>
              </li>
            );
          })}
        </ul>
      </div>
    );
  }

  if (k === "resources") {
    const credits = collectDeckCredits(deck);
    return (
      <div className="flex flex-col justify-center h-full px-8 py-6 overflow-auto relative">
        {sideImage}
        <div className="text-xs uppercase tracking-[0.3em] mb-6 font-semibold" style={{ color: T.purple }}>Resources</div>
        <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className={`${presenting ? "text-5xl" : "text-3xl"} font-medium text-stone-900 mb-8 leading-tight`}>
          Take these with you
        </h2>
        <ul className="space-y-3 max-w-3xl">
          {(slide.items || []).map((it, i) => {
            const lvl = itemLevel(it);
            const txt = itemText(it);
            return (
              <li key={i} className="flex gap-4 items-start p-4 rounded-xl bg-white border border-stone-200" style={{ marginLeft: lvl * 28 + "px" , opacity: isVisible(i) ? 1 : 0, transform: isVisible(i) ? "none" : "translateY(8px)", transition: "opacity 0.4s ease, transform 0.4s ease" }}>
                <Phone size={presenting ? 22 : 16} className="shrink-0 mt-1" style={{ color: T.purple, opacity: 1 - lvl * 0.3 }} />
                <span style={{ fontFamily: "Manrope, sans-serif" }} className={`${presenting ? "text-xl" : "text-base"} ${lvl > 0 ? "text-stone-600" : "text-stone-800"} leading-snug`}>
                  {txt}
                </span>
              </li>
            );
          })}
        </ul>

        {credits.length > 0 && (
          <div className="mt-8 pt-6 border-t border-stone-200 max-w-3xl">
            <div className="text-[10px] uppercase tracking-[0.25em] font-semibold mb-3" style={{ color: T.inkSoft, fontFamily: "Manrope, sans-serif" }}>
              Image credits
            </div>
            <div className={`${presenting ? "text-sm" : "text-xs"} text-stone-500 leading-relaxed`} style={{ fontFamily: "Manrope, sans-serif" }}>
              {credits.map((c, i) => (
                <span key={c.id}>
                  {i > 0 && <span className="text-stone-300 mx-1.5">·</span>}
                  <a href={c.photographerUrl || c.sourceUrl || "#"} target="_blank" rel="noopener noreferrer" className="hover:underline">
                    {c.photographer}
                  </a>
                  <span className="text-stone-400"> on </span>
                  <a href={c.sourceUrl || "#"} target="_blank" rel="noopener noreferrer" className="hover:underline capitalize">
                    {c.source}
                  </a>
                </span>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  return <div className="p-8 text-stone-500">Unknown slide kind: {k}</div>;
}

// =====================================================================
// SLIDE EDITOR
// =====================================================================

function SlideEditor({ slide, onChange }) {
  const [showImageSearch, setShowImageSearch] = useState(false);
  if (!slide) return null;
  const k = slide.kind;
  const set = (field, val) => onChange({ ...slide, [field]: val });
  const setItem = (field, idx, val) => {
    const arr = [...(slide[field] || [])];
    arr[idx] = val;
    set(field, arr);
  };
  const addItem = (field, blank = "") => set(field, [...(slide[field] || []), blank]);
  const removeItem = (field, idx) => {
    const arr = [...(slide[field] || [])];
    arr.splice(idx, 1);
    set(field, arr);
  };

  const inputCls = "w-full p-3 bg-white border border-stone-200 rounded-lg text-stone-900 outline-none focus:border-stone-400 transition";
  const textCls = `${inputCls} resize-y min-h-[80px]`;
  const labelCls = "text-xs font-semibold uppercase tracking-widest text-stone-500 mb-2 block";

  // Image attach panel — used by concept/case/activity to add a side image
  const renderImageAttach = () => (
    <div className="pt-3 mt-3 border-t border-dashed border-stone-200">
      <label className={labelCls}>Side image (optional)</label>
      {slide.image ? (
        <div className="flex items-start gap-3">
          <img src={slide.image.thumbUrl} alt="" className="w-24 h-24 object-cover rounded-lg border border-stone-200 shrink-0" />
          <div className="flex-1 min-w-0">
            <div className="text-xs text-stone-600 leading-snug">
              <span className="capitalize font-semibold">{slide.image.source}</span>
              {" · "}
              {slide.image.photographer}
            </div>
            <div className="flex gap-2 mt-2">
              <button onClick={() => setShowImageSearch(true)} className="text-xs font-semibold px-3 py-1.5 rounded-full bg-stone-100 hover:bg-stone-200 transition flex items-center gap-1">
                <ImagePlus size={12} /> Replace
              </button>
              <button onClick={() => set("image", null)} className="text-xs font-semibold px-3 py-1.5 rounded-full bg-red-50 text-red-600 hover:bg-red-100 transition flex items-center gap-1">
                <X size={12} /> Remove
              </button>
            </div>
          </div>
        </div>
      ) : (
        <button onClick={() => setShowImageSearch(true)} className="w-full px-4 py-3 rounded-xl border-2 border-dashed border-stone-300 hover:border-stone-500 hover:bg-stone-50 transition text-sm font-semibold text-stone-600 flex items-center justify-center gap-2">
          <ImagePlus size={16} /> Find a free image
        </button>
      )}
    </div>
  );

  // Image kind dedicated editor
  const renderImageEditor = () => (
    <>
      {slide.image ? (
        <div>
          <label className={labelCls}>Image</label>
          <div className="border border-stone-200 rounded-xl p-4 bg-stone-50 space-y-3">
            <img src={slide.image.previewUrl || slide.image.thumbUrl} alt="" className="w-full max-h-64 object-contain rounded-lg" />
            <div className="text-xs text-stone-600 leading-snug">
              <strong className="capitalize">{slide.image.source}</strong> · by{" "}
              <a href={slide.image.photographerUrl} target="_blank" rel="noopener noreferrer" className="underline">{slide.image.photographer}</a>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setShowImageSearch(true)} className="text-xs font-semibold px-3 py-1.5 rounded-full bg-white border border-stone-200 hover:bg-stone-100 transition flex items-center gap-1">
                <ImagePlus size={12} /> Replace
              </button>
              <button onClick={() => set("image", null)} className="text-xs font-semibold px-3 py-1.5 rounded-full bg-red-50 text-red-600 hover:bg-red-100 transition flex items-center gap-1">
                <X size={12} /> Remove
              </button>
            </div>
          </div>
        </div>
      ) : (
        <button onClick={() => setShowImageSearch(true)} className="w-full px-6 py-8 rounded-2xl border-2 border-dashed border-stone-300 hover:border-stone-900 hover:bg-stone-50 transition text-stone-600 flex flex-col items-center justify-center gap-2">
          <ImagePlus size={28} className="text-stone-400" />
          <span className="text-sm font-semibold">Find a free image</span>
          <span className="text-xs text-stone-400">Search Pexels · Unsplash · Pixabay</span>
        </button>
      )}
      <div>
        <label className={labelCls}>Caption (optional)</label>
        <input value={slide.caption || ""} onChange={e => set("caption", e.target.value)} className={inputCls} placeholder="Caption shown under the image" />
      </div>
    </>
  );

  // Render an editable list of items. Returns JSX directly (not a component) to preserve input focus across renders.
  // Supports:
  //   - Tab to increase indent level (sub-bullet), Shift+Tab to decrease
  //   - Drag-and-drop to reorder
  //   - Both legacy string items and new {text, level} object items
  const setItemNorm = (field, idx, next) => {
    const arr = [...(slide[field] || [])];
    arr[idx] = next;
    set(field, arr);
  };
  const adjustLevel = (field, idx, delta) => {
    const arr = [...(slide[field] || [])];
    const cur = normalizeItem(arr[idx]);
    cur.level = Math.max(0, Math.min(3, cur.level + delta));
    arr[idx] = cur;
    set(field, arr);
  };
  const moveItem = (field, fromIdx, toIdx) => {
    if (fromIdx === toIdx) return;
    const arr = [...(slide[field] || [])];
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    set(field, arr);
  };

  const renderItemList = (field, label, placeholder = "Item") => (
    <div>
      <label className={labelCls}>
        {label}
        <span className="ml-2 text-stone-400 normal-case font-normal tracking-normal">— Tab to indent · drag to reorder</span>
      </label>
      <div className="space-y-2">
        {(slide[field] || []).map((it, i) => {
          const norm = normalizeItem(it);
          return (
            <div
              key={i}
              className="flex gap-2 items-start group"
              style={{ marginLeft: norm.level * 24 + "px" }}
              draggable
              onDragStart={e => {
                e.dataTransfer.effectAllowed = "move";
                e.dataTransfer.setData("text/plain", String(i));
              }}
              onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; }}
              onDrop={e => {
                e.preventDefault();
                const from = parseInt(e.dataTransfer.getData("text/plain"), 10);
                if (!isNaN(from)) moveItem(field, from, i);
              }}
            >
              <span className="cursor-grab active:cursor-grabbing pt-3 text-stone-300 group-hover:text-stone-500 select-none" title="Drag to reorder">⋮⋮</span>
              <textarea
                value={norm.text}
                onChange={e => setItemNorm(field, i, { text: e.target.value, level: norm.level })}
                onKeyDown={e => {
                  if (e.key === "Tab") {
                    e.preventDefault();
                    adjustLevel(field, i, e.shiftKey ? -1 : 1);
                  }
                }}
                placeholder={placeholder}
                className={`${textCls} min-h-[44px] flex-1`}
                rows={2}
              />
              <button onClick={() => removeItem(field, i)} className="p-2 text-stone-400 hover:text-red-500 transition shrink-0" title="Delete">
                <X size={16} />
              </button>
            </div>
          );
        })}
        <button onClick={() => addItem(field, { text: "", level: 0 })} className="text-sm font-semibold flex items-center gap-1.5 hover:opacity-80" style={{ color: BRAND.purple }}>
          + Add item
        </button>
      </div>
    </div>
  );

  return (
    <div className="space-y-5" style={{ fontFamily: "Manrope, sans-serif" }}>
      <div className="flex items-center gap-3 pb-3 border-b border-stone-200">
        <Pill color={BRAND.purple} light>{SLIDE_KIND_LABELS[k] || k}</Pill>
        <span className="text-xs text-stone-400">Edit fields below — saves automatically</span>
      </div>

      {(k === "title") && (
        <>
          <div><label className={labelCls}>Title</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          <div><label className={labelCls}>Tagline</label><input value={slide.tagline || ""} onChange={e => set("tagline", e.target.value)} className={inputCls} /></div>
        </>
      )}
      {(k === "why") && (
        <>
          <div><label className={labelCls}>Hook (the bold sentence)</label><textarea value={slide.hook || ""} onChange={e => set("hook", e.target.value)} className={textCls} /></div>
          <div><label className={labelCls}>Body</label><textarea value={slide.body || ""} onChange={e => set("body", e.target.value)} className={textCls} /></div>
        </>
      )}
      {(k === "objectives") && renderItemList("items", "Objectives", "Objective…")}
      {(k === "concept") && (
        <>
          <div><label className={labelCls}>Title</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          <div><label className={labelCls}>Body</label><textarea value={slide.body || ""} onChange={e => set("body", e.target.value)} className={textCls} /></div>
        </>
      )}
      {(k === "deepdive") && (
        <>
          <div><label className={labelCls}>Title</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          {renderItemList("items", "Bullets (use **bold** for terms)", "**Term:** definition")}
        </>
      )}
      {(k === "case") && (
        <>
          <div><label className={labelCls}>Person (name, age)</label><input value={slide.name || ""} onChange={e => set("name", e.target.value)} className={inputCls} /></div>
          <div><label className={labelCls}>Scenario</label><textarea value={slide.scenario || ""} onChange={e => set("scenario", e.target.value)} className={`${textCls} min-h-[140px]`} /></div>
        </>
      )}
      {(k === "discussion") && (
        <>
          <div><label className={labelCls}>Prompt</label><input value={slide.prompt || ""} onChange={e => set("prompt", e.target.value)} className={inputCls} /></div>
          {renderItemList("questions", "Questions", "Question…")}
        </>
      )}
      {(k === "activity") && (
        <>
          <div><label className={labelCls}>Title</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          <div><label className={labelCls}>Instructions</label><textarea value={slide.instructions || ""} onChange={e => set("instructions", e.target.value)} className={`${textCls} min-h-[120px]`} /></div>
        </>
      )}
      {(k === "image") && renderImageEditor()}
      {(k === "video") && (
        <>
          <div>
            <label className={labelCls}>Video URL</label>
            <input
              value={slide.videoUrl || ""}
              onChange={e => set("videoUrl", e.target.value)}
              className={inputCls}
              placeholder="Paste a YouTube, Vimeo, or direct video link"
            />
            <div className="text-xs text-stone-500 mt-1.5 leading-relaxed" style={{ fontFamily: "Manrope, sans-serif" }}>
              Works with: YouTube (e.g. <code className="text-stone-700">youtu.be/dQw4w9WgXcQ</code>), Vimeo,
              and direct <code className="text-stone-700">.mp4</code> / <code className="text-stone-700">.webm</code> URLs (including your DigitalOcean recordings).
            </div>
            {slide.videoUrl && (() => {
              const v = parseVideoUrl(slide.videoUrl);
              return (
                <div className={`mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${v.kind === "unknown" ? "bg-red-50 text-red-700" : "bg-emerald-50 text-emerald-700"}`}>
                  {v.kind === "unknown" ? <><AlertCircle size={12} /> URL not recognized</> : <><Check size={12} /> Recognized as {v.kind}</>}
                </div>
              );
            })()}
          </div>
          <div>
            <label className={labelCls}>Caption (optional)</label>
            <input value={slide.caption || ""} onChange={e => set("caption", e.target.value)} className={inputCls} placeholder="Caption shown under the video" />
          </div>
          {slide.videoUrl && parseVideoUrl(slide.videoUrl).kind !== "unknown" && (
            <div className="rounded-xl overflow-hidden border border-stone-200" style={{ aspectRatio: "16/9" }}>
              {(() => {
                const v = parseVideoUrl(slide.videoUrl);
                if (v.kind === "file") {
                  return <video src={v.embedUrl} controls className="w-full h-full" />;
                }
                return <iframe src={v.embedUrl} className="w-full h-full" allow="autoplay; encrypted-media; picture-in-picture" allowFullScreen style={{ border: 0 }} />;
              })()}
            </div>
          )}
        </>
      )}
      {(k === "worksheet") && (
        <>
          <div><label className={labelCls}>Title</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          {renderItemList("items", "Worksheet tasks", "Task…")}
        </>
      )}
      {(k === "outcome") && (
        <>
          <div><label className={labelCls}>Heading</label><input value={slide.title || ""} onChange={e => set("title", e.target.value)} className={inputCls} /></div>
          {renderItemList("items", "Outcomes", "What they walk out with…")}
        </>
      )}
      {(k === "resources") && renderItemList("items", "Resources", "Resource: phone / website")}

      {/* Image attach available on every slide type EXCEPT the dedicated image kind (which has its own picker) */}
      {k !== "image" && renderImageAttach()}

      {showImageSearch && (
        <ImageSearchModal
          onClose={() => setShowImageSearch(false)}
          onPick={(img) => {
            // Strip server-only fields, keep what we need for display + credits
            const clean = {
              id: img.id,
              source: img.source,
              thumbUrl: img.thumbUrl,
              previewUrl: img.previewUrl,
              fullUrl: img.fullUrl,
              alt: img.alt,
              photographer: img.photographer,
              photographerUrl: img.photographerUrl,
              sourceUrl: img.sourceUrl
            };
            set("image", clean);
          }}
        />
      )}
    </div>
  );
}

function Presentation({ deck, onClose }) {
  const [idx, setIdx] = useState(0);
  const [showNotes, setShowNotes] = useState(false);
  const [bulletStep, setBulletStep] = useState(0); // current bullet "step" within a slide
  const [animKey, setAnimKey] = useState(0); // bumps to retrigger CSS animation on slide change

  // Per-deck settings with defaults
  const transitionStyle = deck?.transition || "smooth"; // "smooth" | "lively"
  const bulletAnim = deck?.bulletAnim || "all";          // "all" | "click"

  // Count of "stepped" bullets on current slide (only used when bulletAnim==="click")
  const currentSlide = deck.slides[idx];
  const bulletCount = useMemo(() => {
    if (!currentSlide) return 0;
    const arr = currentSlide.items || currentSlide.questions || [];
    return arr.length;
  }, [currentSlide]);

  // Reset bullet step when slide changes
  useEffect(() => {
    setBulletStep(0);
    setAnimKey(k => k + 1);
  }, [idx]);

  const advance = () => {
    if (bulletAnim === "click" && bulletStep < bulletCount) {
      setBulletStep(s => s + 1);
      return;
    }
    setIdx(i => Math.min(deck.slides.length - 1, i + 1));
  };
  const retreat = () => {
    if (bulletAnim === "click" && bulletStep > 0) {
      setBulletStep(s => s - 1);
      return;
    }
    setIdx(i => Math.max(0, i - 1));
  };

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") advance();
      else if (e.key === "ArrowLeft" || e.key === "PageUp") retreat();
      else if (e.key === "Escape") onClose();
      else if (e.key === "n" || e.key === "N") setShowNotes(v => !v);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [deck.slides.length, onClose, bulletStep, bulletCount, bulletAnim]);

  const slide = deck.slides[idx];
  const total = deck.slides.length;

  const facilitatorPrompt = useMemo(() => {
    if (!slide) return "";
    if (slide.kind === "title") return "Welcome the room. Name what we're doing here. 'Two hours, one outcome you walk home with.' Keep eye contact.";
    if (slide.kind === "why") return "Pause after the hook. Let it land. Don't rush to body text. Ask if anyone has lived this.";
    if (slide.kind === "objectives") return "Read each objective. Make eye contact at each one. End with: 'Anything missing? Add it now.'";
    if (slide.kind === "concept") return "Slow down. This is the anchor of the hour. Repeat the core idea twice in different words.";
    if (slide.kind === "deepdive") return "Don't read every bullet. Hit 2–3, ask which the room wants to dig into. Move on if energy drops.";
    if (slide.kind === "case") return "Read the case slowly. Let people sit with it. Ask: 'Who do you know like this person?'";
    if (slide.kind === "discussion") return "5 minutes per question max. Pair shares first if room is quiet. You shut up — they talk.";
    if (slide.kind === "activity") return "Hand out worksheet. Time it strictly. Walk the room. Whisper-coach the quiet ones.";
    if (slide.kind === "worksheet") return "Bridge: 'In our 1-on-1 next, we work YOUR situation. Bring this back filled in if you want a head start.'";
    if (slide.kind === "outcome") return "Read the outcomes back. Ask: 'Which one matters most to you?' Note it in their file.";
    if (slide.kind === "resources") return "Make sure they have these saved in their phone before they leave the room. Don't trust paper.";
    return "";
  }, [slide]);

  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{ background: BRAND.cream }}>
      {/* TOP BAR */}
      <div className="flex items-center justify-between px-6 py-3 border-b border-stone-200" style={{ background: BRAND.paper }}>
        <div className="flex items-center gap-4">
          <Logo size="sm" />
          <div className="h-6 w-px bg-stone-300" />
          <div style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-base font-medium text-stone-900 truncate max-w-md">
            {deck.title}
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button
            onClick={() => setShowNotes(v => !v)}
            className={`px-3 py-1.5 rounded-full text-xs font-semibold transition ${showNotes ? "text-white" : "text-stone-600 bg-stone-100 hover:bg-stone-200"}`}
            style={showNotes ? { background: BRAND.purpleDeep } : {}}
          >
            {showNotes ? "Notes ON" : "Notes OFF"} (N)
          </button>
          <button onClick={onClose} className="p-2 rounded-full hover:bg-stone-100 transition" title="Exit (Esc)">
            <X size={18} />
          </button>
        </div>
      </div>

      {/* SLIDE STAGE */}
      <div className="flex-1 flex relative overflow-hidden">
        {/* Decorative side numbers */}
        <div className="absolute top-1/2 left-8 -translate-y-1/2 hidden lg:block pointer-events-none" style={{ fontFamily: "Fraunces, Georgia, serif" }}>
          <div className="text-[160px] font-medium leading-none opacity-[0.06] text-stone-900 select-none">
            {String(idx + 1).padStart(2, "0")}
          </div>
        </div>

        <div className="flex-1 flex items-center justify-center p-8 lg:p-16 overflow-auto">
          <div
            key={animKey}
            className={`w-full max-w-6xl h-full max-h-[85vh] rounded-3xl shadow-2xl overflow-hidden relative ${transitionStyle === "lively" ? "lh-anim-lively" : "lh-anim-smooth"}`}
            data-theme-mode={getTheme(deck?.theme).bg.startsWith("#1") || getTheme(deck?.theme).bg.startsWith("#2") ? "dark" : "light"}
            style={{
              aspectRatio: "16/9",
              background: getTheme(deck?.theme).surface,
              border: `1px solid ${getTheme(deck?.theme).border}`,
              "--lh-ink": getTheme(deck?.theme).ink,
              "--lh-ink-soft": getTheme(deck?.theme).inkSoft,
              "--lh-paper": getTheme(deck?.theme).paper
            }}
          >
            <div className="absolute inset-0 overflow-auto">
              <SlideRender slide={slide} deck={deck} presenting bulletReveal={bulletAnim === "click" ? bulletStep : null} />
            </div>
            <div className="absolute top-6 right-8 text-xs uppercase tracking-widest font-semibold opacity-50" style={{ fontFamily: "Manrope, sans-serif", color: getTheme(deck?.theme).inkSoft }}>
              {idx + 1} / {total}
            </div>
          </div>
        </div>

        {/* Speaker notes drawer */}
        {showNotes && (
          <div className="w-96 border-l border-stone-200 bg-white p-8 overflow-auto shrink-0">
            <div className="text-xs uppercase tracking-[0.25em] font-semibold mb-4" style={{ color: BRAND.purple }}>Facilitator Notes</div>
            <p style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-xl text-stone-900 leading-snug mb-6 italic">
              {facilitatorPrompt}
            </p>
            <div className="text-xs uppercase tracking-[0.25em] font-semibold mb-3 text-stone-400">Up next</div>
            <div className="space-y-2">
              {deck.slides.slice(idx + 1, idx + 4).map((s, i) => (
                <div key={i} className="text-sm text-stone-600 p-3 bg-stone-50 rounded-lg">
                  <span className="font-semibold text-stone-400 text-xs uppercase tracking-wider mr-2">{SLIDE_KIND_LABELS[s.kind]}</span>
                  {s.title || s.hook || s.name || s.prompt || ""}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM BAR */}
      <div className="flex items-center justify-between px-6 py-4 border-t border-stone-200" style={{ background: BRAND.paper }}>
        <div className="flex items-center gap-3">
          <button onClick={() => setIdx(0)} className="p-2 rounded-full hover:bg-stone-100" disabled={idx === 0}>
            <RotateCcw size={16} />
          </button>
          <button onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0} className="p-2 rounded-full hover:bg-stone-100 disabled:opacity-30">
            <ChevronLeft size={20} />
          </button>
        </div>
        <div className="flex-1 mx-8 flex items-center gap-1 overflow-x-auto">
          {deck.slides.map((s, i) => (
            <button
              key={i}
              onClick={() => setIdx(i)}
              className="h-1.5 rounded-full transition flex-1 min-w-[10px] max-w-[40px]"
              style={{
                background: i === idx ? BRAND.purpleDeep : i < idx ? BRAND.green : "#E5E0D2"
              }}
              title={`${i + 1}. ${SLIDE_KIND_LABELS[s.kind]}`}
            />
          ))}
        </div>
        <button onClick={() => setIdx(i => Math.min(total - 1, i + 1))} disabled={idx === total - 1} className="p-2 rounded-full hover:bg-stone-100 disabled:opacity-30">
          <ChevronRight size={20} />
        </button>
      </div>
    </div>
  );
}

function DeckView({ deck, deckId, onBack, onPresent, onSave, onReset, isCustom, onDeleteCustom, onShowWorksheet, onShowExport }) {
  const [activeIdx, setActiveIdx] = useState(0);
  const [editing, setEditing] = useState(false);
  const [showAddMenu, setShowAddMenu] = useState(false);
  const [isPublished, setIsPublished] = useState(false);

  const cat = CATEGORIES.find(c => c.id === (deck.cat || deck.category)) || CATEGORIES[0];
  const slide = deck.slides[activeIdx];

  const updateSlide = (next) => {
    const slides = [...deck.slides];
    slides[activeIdx] = next;
    onSave({ ...deck, slides });
  };

  const updateField = (field, val) => {
    onSave({ ...deck, [field]: val });
  };

  const moveSlide = (dir) => {
    const slides = [...deck.slides];
    const ni = activeIdx + dir;
    if (ni < 0 || ni >= slides.length) return;
    [slides[activeIdx], slides[ni]] = [slides[ni], slides[activeIdx]];
    onSave({ ...deck, slides });
    setActiveIdx(ni);
  };

  const removeSlide = () => {
    if (deck.slides.length <= 1) return;
    const slides = deck.slides.filter((_, i) => i !== activeIdx);
    onSave({ ...deck, slides });
    setActiveIdx(Math.max(0, activeIdx - 1));
  };

  const addSlideOfKind = (kind) => {
    const slides = [...deck.slides];
    slides.splice(activeIdx + 1, 0, blankSlide(kind));
    onSave({ ...deck, slides });
    setActiveIdx(activeIdx + 1);
    setShowAddMenu(false);
  };

  return (
    <div className="flex flex-col h-full">
      {/* HEADER */}
      <div className="px-8 lg:px-12 py-6 border-b border-stone-200" style={{ background: BRAND.paper }}>
        <button onClick={onBack} className="text-sm font-semibold flex items-center gap-1.5 mb-4 text-stone-500 hover:text-stone-900 transition" style={{ fontFamily: "Manrope, sans-serif" }}>
          <ChevronLeft size={14} /> All workshops
        </button>
        <div className="flex flex-wrap items-start justify-between gap-6">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-3 mb-3">
              <Pill color={cat.accent} light>{cat.label}</Pill>
              {isCustom && <Pill color={BRAND.amber} light>Custom workshop</Pill>}
              <span className="text-xs text-stone-400" style={{ fontFamily: "Manrope, sans-serif" }}>{deck.slides.length} slides · 2 hour session</span>
            </div>
            {editing ? (
              <input
                value={deck.title}
                onChange={e => updateField("title", e.target.value)}
                style={{ fontFamily: "Fraunces, Georgia, serif", letterSpacing: "-0.02em" }}
                className="text-4xl md:text-5xl font-medium bg-transparent w-full outline-none border-b-2 border-dashed border-stone-300 focus:border-stone-600 transition"
              />
            ) : (
              <h1 style={{ fontFamily: "Fraunces, Georgia, serif", letterSpacing: "-0.02em" }} className="text-4xl md:text-5xl font-medium text-stone-900 leading-tight">
                {deck.title}
              </h1>
            )}
            {editing ? (
              <input
                value={deck.tagline || ""}
                onChange={e => updateField("tagline", e.target.value)}
                placeholder="Tagline…"
                style={{ fontFamily: "Fraunces, Georgia, serif" }}
                className="text-lg italic mt-2 bg-transparent w-full outline-none text-stone-600 border-b border-dashed border-stone-200 focus:border-stone-500 transition"
              />
            ) : deck.tagline && (
              <p style={{ fontFamily: "Fraunces, Georgia, serif" }} className="italic text-lg md:text-xl text-stone-600 mt-2">{deck.tagline}</p>
            )}
          </div>
          <div className="flex flex-wrap items-center gap-2 shrink-0">
            <button
              onClick={() => setEditing(e => !e)}
              className={`px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 transition ${editing ? "text-white" : "text-stone-700 bg-stone-100 hover:bg-stone-200"}`}
              style={editing ? { background: BRAND.purple } : { fontFamily: "Manrope, sans-serif" }}
            >
              <Edit3 size={14} /> {editing ? "Done editing" : "Edit"}
            </button>
            <button onClick={onShowWorksheet} className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 text-stone-700 bg-stone-100 hover:bg-stone-200 transition" style={{ fontFamily: "Manrope, sans-serif" }}>
              <ClipboardCheck size={14} /> Worksheet
            </button>
            <button onClick={onShowExport} className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 text-stone-700 bg-stone-100 hover:bg-stone-200 transition" style={{ fontFamily: "Manrope, sans-serif" }} title="Download as PDF or PowerPoint">
              <Download size={14} /> Download
            </button>
            <DeckSettingsDropdown deck={deck} onChange={onSave} />
            <PublishToggle deck={deck} deckId={deckId} onPublishChange={setIsPublished} />
            <ShareDeckButton deckId={deckId} isPublished={isPublished} />
            {!isCustom && (
              <button onClick={onReset} className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 text-stone-500 hover:text-stone-900 transition" style={{ fontFamily: "Manrope, sans-serif" }} title="Reset to original">
                <RotateCcw size={14} /> Reset
              </button>
            )}
            {isCustom && (
              <button onClick={onDeleteCustom} className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 text-red-600 hover:bg-red-50 transition" style={{ fontFamily: "Manrope, sans-serif" }}>
                <X size={14} /> Delete
              </button>
            )}
            <button onClick={onPresent} className="px-5 py-2 rounded-full text-sm font-semibold text-white flex items-center gap-2 transition shadow-sm" style={{ background: BRAND.purpleDeep, fontFamily: "Manrope, sans-serif" }}>
              <Maximize2 size={14} /> Present
            </button>
          </div>
        </div>
      </div>

      {/* MAIN — slide list + active slide */}
      <div className="flex-1 flex min-h-0">
        {/* Slide thumbnail rail */}
        <div className="w-72 shrink-0 border-r border-stone-200 overflow-auto" style={{ background: BRAND.paper }}>
          <div className="p-4 space-y-2">
            {deck.slides.map((s, i) => (
              <div
                key={i}
                draggable={editing}
                onDragStart={editing ? (e) => {
                  e.dataTransfer.effectAllowed = "move";
                  e.dataTransfer.setData("text/plain", String(i));
                } : undefined}
                onDragOver={editing ? (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; } : undefined}
                onDrop={editing ? (e) => {
                  e.preventDefault();
                  const from = parseInt(e.dataTransfer.getData("text/plain"), 10);
                  if (isNaN(from) || from === i) return;
                  const slides = [...deck.slides];
                  const [moved] = slides.splice(from, 1);
                  slides.splice(i, 0, moved);
                  onSave({ ...deck, slides });
                  setActiveIdx(i);
                } : undefined}
              >
                <button
                  onClick={() => setActiveIdx(i)}
                  className={`w-full text-left p-3 rounded-xl transition border-2 ${i === activeIdx ? "bg-white border-stone-900" : "bg-stone-50 hover:bg-stone-100 border-transparent"} ${editing ? "cursor-grab active:cursor-grabbing" : ""}`}
                >
                  <div className="flex items-center gap-2 mb-1">
                    {editing && <span className="text-stone-300" title="Drag to reorder">⋮⋮</span>}
                    <span className="text-[10px] font-bold text-stone-400 tracking-widest" style={{ fontFamily: "Manrope, sans-serif" }}>{String(i + 1).padStart(2, "0")}</span>
                    <span className="text-[10px] font-semibold uppercase tracking-wider" style={{ color: cat.accent }}>{SLIDE_KIND_LABELS[s.kind]}</span>
                  </div>
                  <div style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-sm text-stone-800 leading-snug line-clamp-2">
                    {s.title || s.hook || s.name || s.prompt || (s.items && itemText(s.items[0])) || s.body || s.caption || (s.kind === "video" && s.videoUrl ? "🎬 " + (parseVideoUrl(s.videoUrl).kind === "youtube" ? "YouTube video" : parseVideoUrl(s.videoUrl).kind === "vimeo" ? "Vimeo video" : "Video") : "") || (s.kind === "image" && s.image ? "🖼 Image: " + (s.image.alt || s.image.photographer || "Photo") : "") || "(empty)"}
                  </div>
                </button>
              </div>
            ))}
            {editing && (
              <div className="pt-2 relative">
                <button
                  onClick={() => setShowAddMenu(v => !v)}
                  className="w-full p-3 rounded-xl border-2 border-dashed border-stone-300 hover:border-stone-500 hover:bg-white transition text-stone-500 text-sm font-semibold flex items-center justify-center gap-2"
                  style={{ fontFamily: "Manrope, sans-serif" }}
                >
                  + Add slide after #{activeIdx + 1}
                </button>
                {showAddMenu && (
                  <div className="mt-2 bg-white border border-stone-200 rounded-xl p-2 shadow-lg space-y-0.5">
                    {SLIDE_ORDER.map(k => (
                      <button
                        key={k}
                        onClick={() => addSlideOfKind(k)}
                        className="w-full text-left text-sm px-3 py-2 rounded-lg hover:bg-stone-100 transition"
                        style={{ fontFamily: "Manrope, sans-serif" }}
                      >
                        {SLIDE_KIND_LABELS[k]}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Active slide preview/edit */}
        <div className="flex-1 overflow-auto">
          <div className="p-8 lg:p-12 max-w-5xl mx-auto">
            <div className="flex items-center justify-between mb-6">
              <div className="text-xs uppercase tracking-[0.25em] font-semibold text-stone-500" style={{ fontFamily: "Manrope, sans-serif" }}>
                Slide {activeIdx + 1} of {deck.slides.length} · {SLIDE_KIND_LABELS[slide.kind]}
              </div>
              {editing && (
                <div className="flex items-center gap-1">
                  <button onClick={() => moveSlide(-1)} disabled={activeIdx === 0} className="p-1.5 rounded hover:bg-stone-100 disabled:opacity-30" title="Move up">
                    <ChevronLeft size={16} className="rotate-90" />
                  </button>
                  <button onClick={() => moveSlide(1)} disabled={activeIdx === deck.slides.length - 1} className="p-1.5 rounded hover:bg-stone-100 disabled:opacity-30" title="Move down">
                    <ChevronRight size={16} className="rotate-90" />
                  </button>
                  <button onClick={removeSlide} disabled={deck.slides.length <= 1} className="p-1.5 rounded hover:bg-red-50 text-red-500 disabled:opacity-30" title="Delete slide">
                    <X size={16} />
                  </button>
                </div>
              )}
            </div>

            <div
              className="rounded-2xl mb-6 overflow-hidden"
              data-theme-mode={getTheme(deck?.theme).bg.startsWith("#1") || getTheme(deck?.theme).bg.startsWith("#2") ? "dark" : "light"}
              style={{
                aspectRatio: "16/10",
                background: getTheme(deck?.theme).surface,
                border: `1px solid ${getTheme(deck?.theme).border}`,
                "--lh-ink": getTheme(deck?.theme).ink,
                "--lh-ink-soft": getTheme(deck?.theme).inkSoft,
                "--lh-paper": getTheme(deck?.theme).paper
              }}
            >
              <div className="h-full overflow-auto">
                <SlideRender slide={slide} deck={deck} presenting={false} />
              </div>
            </div>

            {editing && (
              <div className="bg-white border border-stone-200 rounded-2xl p-6">
                <SlideEditor slide={slide} onChange={updateSlide} />
              </div>
            )}

            <RecordingsPanel deckId={deckId} deckTitle={deck.title} />
          </div>
        </div>
      </div>
    </div>
  );
}

        blankSlide("title"),
        blankSlide("why"),
        blankSlide("objectives"),
        blankSlide("concept"),
        blankSlide("deepdive"),
