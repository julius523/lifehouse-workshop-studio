// Simple flatten for slide text used in PPTX export
function slideTextDump(slide) {
  const k = slide.kind;
  const lines = [];
  if (slide.title) lines.push({ text: slide.title, role: "title" });
  if (slide.tagline) lines.push({ text: slide.tagline, role: "tagline" });
  if (slide.hook) lines.push({ text: slide.hook, role: "hook" });
  if (slide.body) lines.push({ text: slide.body, role: "body" });
  if (slide.name) lines.push({ text: slide.name, role: "name" });
  if (slide.scenario) lines.push({ text: slide.scenario, role: "body" });
  if (slide.prompt) lines.push({ text: slide.prompt, role: "title" });
  if (slide.instructions) lines.push({ text: slide.instructions, role: "body" });
  if (slide.caption) lines.push({ text: slide.caption, role: "caption" });
  const itemArr = slide.items || slide.questions || [];
  itemArr.forEach((it) => lines.push({ text: itemText(it), role: "bullet", level: itemLevel(it) }));
  return lines;
}

// Build a downloadable .pptx and trigger save
async function exportToPptx(deck, deckTitle) {
  const pptx = new PptxGenJS();
  pptx.layout = "LAYOUT_WIDE"; // 13.33 x 7.5
  pptx.title = deckTitle;
  pptx.author = "Life House Reentry";
  pptx.company = "Life House Reentry";

  const PURPLE = "5B2D8A";
  const PURPLE_DEEP = "3E1E62";
  const GREEN = "1FAE7C";
  const CREAM = "FAF6EE";
  const INK = "1A1410";
  const STONE = "6B6056";

  for (const slide of deck.slides) {
    const s = pptx.addSlide();
    s.background = { color: "FFFFFF" };
    const k = slide.kind;
    const dump = slideTextDump(slide);

    // Side image (if present, except for image-kind which goes full)
    let textWidth = 12.5;
    if (slide.image && k !== "image" && k !== "title") {
      try {
        s.addImage({
          path: slide.image.fullUrl || slide.image.previewUrl,
          x: 9.5, y: 0.5, w: 3.3, h: 2.5,
          rounding: true
        });
        textWidth = 8.5;
      } catch (e) { /* skip image on err */ }
    }

    // Title-kind: hero with image background
    if (k === "title") {
      if (slide.image) {
        try {
          s.addImage({ path: slide.image.fullUrl || slide.image.previewUrl, x: 0, y: 0, w: 13.33, h: 7.5 });
          // light overlay
          s.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 7.5, fill: { color: CREAM, transparency: 15 }, line: { type: "none" } });
        } catch (e) {}
      }
      s.addText("LIFE HOUSE REENTRY · WORKSHOP", { x: 0.5, y: 1.6, w: 12, h: 0.4, fontFace: "Manrope", fontSize: 10, color: PURPLE, bold: true, charSpacing: 8 });
      s.addText(slide.title || "Workshop", { x: 0.5, y: 2.1, w: 12, h: 2.3, fontFace: "Fraunces", fontSize: 60, color: INK, bold: false });
      if (slide.tagline) {
        s.addText(slide.tagline, { x: 0.5, y: 4.6, w: 11, h: 1, fontFace: "Fraunces", fontSize: 24, italic: true, color: PURPLE_DEEP });
      }
      continue;
    }

    // Image-kind: full slide image
    if (k === "image") {
      if (slide.image) {
        try { s.addImage({ path: slide.image.fullUrl || slide.image.previewUrl, x: 0.5, y: 0.5, w: 12.33, h: 6 }); } catch(e) {}
      }
      if (slide.caption) {
        s.addText(slide.caption, { x: 0.5, y: 6.6, w: 12.33, h: 0.6, fontFace: "Fraunces", fontSize: 18, italic: true, color: STONE, align: "center" });
      }
      continue;
    }

    // Section badge (top of every other slide)
    const badges = {
      why: "WHY THIS MATTERS", objectives: "BY THE END OF THIS HOUR",
      concept: "CONCEPT", deepdive: "DEEP DIVE", case: "CASE STUDY",
      discussion: "DISCUSSION", activity: "ACTIVITY — TOGETHER",
      worksheet: "1-ON-1 HOUR", outcome: "THE OUTCOME", resources: "RESOURCES"
    };
    if (badges[k]) {
      s.addText(badges[k], { x: 0.5, y: 0.45, w: 8, h: 0.35, fontFace: "Manrope", fontSize: 11, color: GREEN, bold: true, charSpacing: 6 });
    }

    // Title / heading
    let yPos = 1.0;
    const titleLine = dump.find(l => l.role === "title");
    if (titleLine && titleLine.text) {
      s.addText(titleLine.text, { x: 0.5, y: yPos, w: textWidth, h: 1.0, fontFace: "Fraunces", fontSize: 32, color: INK, bold: false });
      yPos += 1.2;
    }
    const tagLine = dump.find(l => l.role === "tagline");
    if (tagLine) {
      s.addText(tagLine.text, { x: 0.5, y: yPos, w: textWidth, h: 0.6, fontFace: "Fraunces", fontSize: 18, italic: true, color: STONE });
      yPos += 0.7;
    }
    const nameLine = dump.find(l => l.role === "name");
    if (nameLine) {
      s.addText(nameLine.text, { x: 0.5, y: yPos, w: textWidth, h: 0.6, fontFace: "Fraunces", fontSize: 22, italic: true, color: PURPLE_DEEP });
      yPos += 0.7;
    }
    const hookLine = dump.find(l => l.role === "hook");
    if (hookLine) {
      s.addText(`"${hookLine.text}"`, { x: 0.5, y: yPos, w: textWidth, h: 1.5, fontFace: "Fraunces", fontSize: 28, color: INK });
      yPos += 1.6;
    }
    dump.filter(l => l.role === "body").forEach(b => {
      s.addText(b.text, { x: 0.5, y: yPos, w: textWidth, h: 1.2, fontFace: "Manrope", fontSize: 16, color: STONE });
      yPos += 1.3;
    });
    const captionLine = dump.find(l => l.role === "caption");
    if (captionLine) {
      s.addText(captionLine.text, { x: 0.5, y: yPos, w: textWidth, h: 0.5, fontFace: "Fraunces", fontSize: 14, italic: true, color: STONE });
      yPos += 0.6;
    }

    // Bullets
    const bullets = dump.filter(l => l.role === "bullet");
    if (bullets.length > 0) {
      const bulletLines = bullets.map(b => ({
        text: b.text,
        options: {
          bullet: { code: b.level === 0 ? "25CF" : "25E6" },
          indentLevel: b.level || 0,
          paraSpaceBefore: 4
        }
      }));
      s.addText(bulletLines, {
        x: 0.5, y: yPos, w: textWidth, h: 7.5 - yPos - 0.5,
        fontFace: "Manrope", fontSize: 14, color: INK, valign: "top"
      });
    }

    // Footer
    s.addText("LIFE HOUSE REENTRY · workshops.lifehousereentry.com", {
      x: 0.5, y: 7.1, w: 12, h: 0.3, fontFace: "Manrope", fontSize: 8, color: STONE, charSpacing: 4
    });
  }

  await pptx.writeFile({ fileName: `${deckTitle.replace(/[^a-z0-9]/gi, "_")}.pptx` });
}

// PDF export = open print dialog with print-ready CSS targeting only the print region
function exportToPdf() {
  // Add the marker class so CSS reveals the print region
  document.body.classList.add("lh-printing");

  // Wait until: (1) the next paint frame, (2) all visible images in the print region have loaded,
  // (3) a brief settle delay. Then open the print dialog.
  const printRegion = () => document.getElementById("lh-print-region");

  const waitForImages = () => {
    const region = printRegion();
    if (!region) return Promise.resolve();
    const imgs = Array.from(region.querySelectorAll("img"));
    return Promise.all(imgs.map(img => {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(resolve => {
        const done = () => resolve();
        img.addEventListener("load", done, { once: true });
        img.addEventListener("error", done, { once: true });
        // Hard timeout so a slow/missing image doesn't block printing forever
        setTimeout(done, 4000);
      });
    }));
  };

  // Two animation frames for layout + image wait + small settle
  requestAnimationFrame(() => requestAnimationFrame(async () => {
    try {
      await waitForImages();
      // small settle so fonts can swap in
      await new Promise(r => setTimeout(r, 250));
      window.print();
    } finally {
      // Remove the class after the print dialog closes (also a fallback in case)
      setTimeout(() => document.body.classList.remove("lh-printing"), 500);
    }
  }));
}

// SHARE BUTTON — copies a deep link. If the deck is published publicly,
// the link is the public viewer link (no login needed). Otherwise it's
// the private team link.
// ---------------------------------------------------------------------
function ShareDeckButton({ deckId, isPublished }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    const link = isPublished
      ? `${window.location.origin}${window.location.pathname}?public=${encodeURIComponent(deckId)}`
      : `${window.location.origin}${window.location.pathname}?deck=${encodeURIComponent(deckId)}`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }).catch(() => {
        prompt("Copy this link:", link);
      });
    } else {
      prompt("Copy this link:", link);
    }
  };
  return (
    <button
      onClick={handle}
      className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 transition"
      style={{
        fontFamily: "Manrope, sans-serif",
        background: isPublished ? `${BRAND.green}20` : "#F5F5F4",
        color: isPublished ? BRAND.greenDeep : "#44403C"
      }}
      title={isPublished ? "Copy public link (no login required)" : "Copy team link (login required)"}
    >
      {copied
        ? <><Check size={14} /> Copied!</>
        : <><Share2 size={14} /> Share {isPublished ? "(public)" : ""}</>}
    </button>
  );
}

// ---------------------------------------------------------------------
// PUBLISH TOGGLE — controls whether a deck has a publicly viewable link
// ---------------------------------------------------------------------
function PublishToggle({ deck, deckId, onPublishChange }) {
  const auth = useAuth();
  const [busy, setBusy] = useState(false);
  const [isPublished, setIsPublished] = useState(false);
  const [loaded, setLoaded] = useState(false);

  // Check publication status on mount and when deck changes
  useEffect(() => {
    if (!auth?.supabase) { setLoaded(true); return; }
    let live = true;
    (async () => {
      const { data } = await auth.supabase
        .from("public_decks")
        .select("deck_id")
        .eq("deck_id", deckId)
        .maybeSingle();
      if (live) {
        setIsPublished(!!data);
        setLoaded(true);
        onPublishChange && onPublishChange(!!data);
      }
    })();
    return () => { live = false; };
  }, [deckId]);

  const togglePublish = async () => {
    if (!auth?.supabase) return;
    setBusy(true);
    try {
      if (isPublished) {
        // Unpublish — remove from public_decks
        const { error } = await auth.supabase.from("public_decks").delete().eq("deck_id", deckId);
        if (error) throw error;
        setIsPublished(false);
        onPublishChange && onPublishChange(false);
      } else {
        // Publish — upsert deck snapshot
        const { error } = await auth.supabase.from("public_decks").upsert({
          deck_id: deckId,
          snapshot: deck,
          published_by: auth.session.user.id,
          published_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        }, { onConflict: "deck_id" });
        if (error) throw error;
        setIsPublished(true);
        onPublishChange && onPublishChange(true);
      }
    } catch (e) {
      console.error("Publish error:", e);
      alert("Couldn't update public version: " + e.message);
    }
    setBusy(false);
  };

  // If deck is published, also push updates to public_decks when deck changes
  useEffect(() => {
    if (!isPublished || !auth?.supabase || !loaded) return;
    const t = setTimeout(async () => {
      try {
        await auth.supabase.from("public_decks").upsert({
          deck_id: deckId,
          snapshot: deck,
          published_by: auth.session.user.id,
          published_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        }, { onConflict: "deck_id" });
      } catch (e) { /* silent — sync best-effort */ }
    }, 1500);
    return () => clearTimeout(t);
  }, [deck, isPublished]);

  if (!loaded) return null;

  return (
    <button
      onClick={togglePublish}
      disabled={busy}
      className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 transition"
      style={{
        fontFamily: "Manrope, sans-serif",
        background: isPublished ? `${BRAND.green}` : "#F5F5F4",
        color: isPublished ? "white" : "#44403C"
      }}
      title={isPublished ? "Currently published — click to make private again" : "Click to publish a public viewable copy"}
    >
      {busy ? <Loader2 size={14} className="animate-spin" /> : isPublished ? <Eye size={14} /> : <EyeOff size={14} />}
      {isPublished ? "Published" : "Publish to web"}
    </button>
  );
}

// Search Pexels
async function searchPexels(query, page = 1) {
  if (!LH_CFG.PEXELS_KEY) return [];
  try {
    const r = await fetch(
      `https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=15&page=${page}`,
      { headers: { Authorization: LH_CFG.PEXELS_KEY } }
    );
    if (!r.ok) return [];
    const d = await r.json();
    return (d.photos || []).map(p => ({
      id: `pexels:${p.id}`,
      source: "pexels",
      thumbUrl: p.src.medium,
      previewUrl: p.src.large,
      fullUrl: p.src.large2x,
      width: p.width,
      height: p.height,
      photographer: p.photographer,
      photographerUrl: p.photographer_url,
      sourceUrl: p.url,
      alt: p.alt || query
    }));
  } catch (e) {
    console.warn("Pexels error:", e);
    return [];
  }
}

// Search Unsplash
async function searchUnsplash(query, page = 1) {
  if (!LH_CFG.UNSPLASH_KEY) return [];
  try {
    const r = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=15&page=${page}&client_id=${LH_CFG.UNSPLASH_KEY}`
    );
    if (!r.ok) return [];
    const d = await r.json();
    return (d.results || []).map(p => ({
      id: `unsplash:${p.id}`,
      source: "unsplash",
      thumbUrl: p.urls.small,
      previewUrl: p.urls.regular,
      fullUrl: p.urls.regular,
      width: p.width,
      height: p.height,
      photographer: p.user?.name || "Unsplash photographer",
      photographerUrl: p.user?.links?.html ? `${p.user.links.html}?utm_source=lifehouse-workshop-studio&utm_medium=referral` : null,
      sourceUrl: p.links?.html ? `${p.links.html}?utm_source=lifehouse-workshop-studio&utm_medium=referral` : null,
      alt: p.alt_description || query,
      // Unsplash requires we ping their download endpoint when we use a photo
      downloadLocation: p.links?.download_location
    }));
  } catch (e) {
    console.warn("Unsplash error:", e);
    return [];
  }
}

// Search Pixabay
async function searchPixabay(query, page = 1) {
  if (!LH_CFG.PIXABAY_KEY) return [];
  try {
    const r = await fetch(
      `https://pixabay.com/api/?key=${LH_CFG.PIXABAY_KEY}&q=${encodeURIComponent(query)}&per_page=15&page=${page}&image_type=photo&safesearch=true`
    );
    if (!r.ok) return [];
    const d = await r.json();
    return (d.hits || []).map(p => ({
      id: `pixabay:${p.id}`,
      source: "pixabay",
      thumbUrl: p.webformatURL,
      previewUrl: p.largeImageURL,
      fullUrl: p.largeImageURL,
      width: p.imageWidth,
      height: p.imageHeight,
      photographer: p.user,
      photographerUrl: `https://pixabay.com/users/${p.user}-${p.user_id}/`,
      sourceUrl: p.pageURL,
      alt: p.tags || query
    }));
  } catch (e) {
    console.warn("Pixabay error:", e);
    return [];
  }
}

// Ping Unsplash's download endpoint when image is selected (their API requirement)
async function pingUnsplashDownload(downloadLocation) {
  if (!downloadLocation || !LH_CFG.UNSPLASH_KEY) return;
  try {
    await fetch(`${downloadLocation}&client_id=${LH_CFG.UNSPLASH_KEY}`);
  } catch (e) { /* fire-and-forget */ }
}

// ---------------------------------------------------------------------
// IMAGE SEARCH MODAL
// ---------------------------------------------------------------------
function ImageSearchModal({ onClose, onPick }) {
  const [query, setQuery] = useState("");
  const [submitted, setSubmitted] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("all"); // all | pexels | unsplash | pixabay
  const [previewing, setPreviewing] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const runSearch = async (q) => {
    if (!q.trim()) return;
    setLoading(true);
    setSubmitted(q);
    setResults([]);
    // Fire all three in parallel
    const [px, un, pb] = await Promise.all([
      searchPexels(q),
      searchUnsplash(q),
      searchPixabay(q)
    ]);
    // Interleave for visual diversity (round-robin)
    const merged = [];
    const max = Math.max(px.length, un.length, pb.length);
    for (let i = 0; i < max; i++) {
      if (px[i]) merged.push(px[i]);
      if (un[i]) merged.push(un[i]);
      if (pb[i]) merged.push(pb[i]);
    }
    setResults(merged);
    setLoading(false);
  };

  const onKeyDown = (e) => {
    if (e.key === "Enter") runSearch(query);
  };

  const handlePick = async (img) => {
    if (img.source === "unsplash" && img.downloadLocation) {
      pingUnsplashDownload(img.downloadLocation); // fire and forget
    }
    onPick(img);
    onClose();
  };

  const filtered = filter === "all" ? results : results.filter(r => r.source === filter);

  const sourceColors = {
    pexels: "#05A081",
    unsplash: "#000000",
    pixabay: "#1FB16C"
  };
  const sourceLabels = {
    pexels: "Pexels",
    unsplash: "Unsplash",
    pixabay: "Pixabay"
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-start justify-center p-4 pt-12" style={{ background: "rgba(26,20,16,0.7)" }} onClick={onClose}>
      <div className="bg-white rounded-3xl w-full max-w-5xl max-h-[88vh] overflow-hidden shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
        {/* HEADER */}
        <div className="px-7 pt-6 pb-4 border-b border-stone-100">
          <div className="flex items-start justify-between mb-4">
            <div>
              <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-2xl font-medium text-stone-900">Find an image</h2>
              <p className="text-sm text-stone-500 mt-0.5" style={{ fontFamily: "Manrope, sans-serif" }}>
                Searching <strong>Pexels</strong> · <strong>Unsplash</strong> · <strong>Pixabay</strong> — all free for our use.
              </p>
            </div>
            <button onClick={onClose} className="p-1.5 rounded-full hover:bg-stone-100"><X size={18} /></button>
          </div>
          <div className="relative">
            <Search size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400" />
            <input
              ref={inputRef}
              value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={onKeyDown}
              placeholder='Try "father and son", "community garden", "black woman smiling", "credit card"…'
              className="w-full pl-11 pr-32 py-3.5 bg-stone-50 border border-stone-200 rounded-full text-stone-900 placeholder:text-stone-400 outline-none focus:border-stone-500 transition"
              style={{ fontFamily: "Manrope, sans-serif" }}
            />
            <button
              onClick={() => runSearch(query)}
              disabled={!query.trim() || loading}
              className="absolute right-1.5 top-1/2 -translate-y-1/2 px-5 py-2 rounded-full text-white text-sm font-semibold disabled:opacity-50 transition"
              style={{ background: BRAND.purpleDeep, fontFamily: "Manrope, sans-serif" }}
            >
              {loading ? <Loader2 size={14} className="animate-spin" /> : "Search"}
            </button>
          </div>

          {submitted && results.length > 0 && (
            <div className="flex items-center gap-2 mt-4 text-xs">
              <span className="text-stone-500 font-semibold">Source:</span>
              {["all", "pexels", "unsplash", "pixabay"].map(f => (
                <button
                  key={f}
                  onClick={() => setFilter(f)}
                  className="px-3 py-1 rounded-full font-semibold transition"
                  style={{
                    background: filter === f ? BRAND.ink : "transparent",
                    color: filter === f ? "white" : "#6B6056",
                    border: filter === f ? `1px solid ${BRAND.ink}` : "1px solid #E6DFD0"
                  }}
                >
                  {f === "all" ? `All (${results.length})` : sourceLabels[f] + " (" + results.filter(r => r.source === f).length + ")"}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* RESULTS GRID */}
        <div className="flex-1 overflow-auto p-5">
          {!submitted && !loading && (
            <div className="text-center py-20 text-stone-400">
              <Image size={40} className="mx-auto mb-3 text-stone-300" />
              <p className="text-sm">Type a search term and press Enter to see images.</p>
            </div>
          )}

          {loading && (
            <div className="flex items-center justify-center py-20">
              <Loader2 size={28} className="animate-spin" style={{ color: BRAND.purple }} />
            </div>
          )}

          {!loading && submitted && filtered.length === 0 && (
            <div className="text-center py-20 text-stone-500">
              <ImageOff size={40} className="mx-auto mb-3 text-stone-300" />
              <p className="text-sm">No images for "{submitted}". Try a different word.</p>
            </div>
          )}

          {!loading && filtered.length > 0 && (
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
              {filtered.map(img => (
                <button
                  key={img.id}
                  onClick={() => handlePick(img)}
                  onMouseEnter={() => setPreviewing(img.id)}
                  onMouseLeave={() => setPreviewing(null)}
                  className="relative aspect-square rounded-xl overflow-hidden bg-stone-100 group focus:outline-none focus:ring-2 focus:ring-stone-900"
                >
                  <img src={img.thumbUrl} alt={img.alt} className="w-full h-full object-cover transition group-hover:scale-105" loading="lazy" />
                  <div className="absolute top-2 left-2">
                    <span className="text-[9px] font-bold px-2 py-0.5 rounded-full text-white tracking-wider uppercase" style={{ background: sourceColors[img.source] }}>
                      {sourceLabels[img.source]}
                    </span>
                  </div>
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/0 to-black/0 opacity-0 group-hover:opacity-100 transition flex flex-col justify-end p-2.5">
                    <div className="text-white text-[10px] font-medium truncate">{img.photographer}</div>
                    <div className="mt-1.5 px-2.5 py-1 rounded-full bg-white text-stone-900 text-xs font-bold text-center">Insert image</div>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// =====================================================================

// Format bytes for human display
function formatBytes(b) {
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(0) + " KB";
  if (b < 1024*1024*1024) return (b/(1024*1024)).toFixed(1) + " MB";
  return (b/(1024*1024*1024)).toFixed(2) + " GB";
}
function formatDuration(secs) {
  if (!secs && secs !== 0) return "0:00";
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

// Pick best mime type the browser supports
function pickMimeType() {
  const candidates = [
    "video/webm;codecs=vp9,opus",
    "video/webm;codecs=vp8,opus",
    "video/webm",
    "video/mp4"
  ];
  for (const m of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  }
  return "";
}

// ---------------------------------------------------------------------
// RECORDER MODAL — choose source, record, review, upload
// ---------------------------------------------------------------------
function RecorderModal({ deckId, deckTitle, onClose, onUploaded }) {
  const auth = useAuth();
  const [phase, setPhase] = useState("choose"); // choose | record | review | upload | done | error
  const [source, setSource] = useState(null);   // 'webcam' | 'screen' | 'screen+cam' | 'upload'
  const [stream, setStream] = useState(null);
  const [recorder, setRecorder] = useState(null);
  const [chunks, setChunks] = useState([]);
  const [duration, setDuration] = useState(0);
  const [recording, setRecording] = useState(false);
  const [recordedBlob, setRecordedBlob] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);
  const [uploadPct, setUploadPct] = useState(0);
  const [errorMsg, setErrorMsg] = useState(null);
  const [title, setTitle] = useState("");
  const [micEnabled, setMicEnabled] = useState(true);
  const previewVideoRef = useRef(null);
  const liveVideoRef = useRef(null);
  const timerRef = useRef(null);
  const fileInputRef = useRef(null);

  // Cleanup streams on unmount
  useEffect(() => {
    return () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (timerRef.current) clearInterval(timerRef.current);
      if (previewUrl) URL.revokeObjectURL(previewUrl);
    };
  }, []);

  // Connect stream to live preview
  useEffect(() => {
    if (stream && liveVideoRef.current) {
      liveVideoRef.current.srcObject = stream;
    }
  }, [stream]);

  // Connect blob to playback preview
  useEffect(() => {
    if (recordedBlob && previewVideoRef.current && previewUrl) {
      previewVideoRef.current.src = previewUrl;
    }
  }, [previewUrl]);

  const startSource = async (kind) => {
    setSource(kind);
    setErrorMsg(null);
    try {
      let s;
      if (kind === "webcam") {
        s = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: micEnabled
        });
      } else if (kind === "screen") {
        s = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 30 } },
          audio: true
        });
        // If screen-share didn't include mic, optionally add it
        if (micEnabled) {
          try {
            const micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            micStream.getAudioTracks().forEach(t => s.addTrack(t));
          } catch (e) { /* fine, screen share has its own audio */ }
        }
      } else if (kind === "screen+cam") {
        const screen = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        if (micEnabled) {
          try {
            const cam = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            cam.getAudioTracks().forEach(t => screen.addTrack(t));
          } catch (e) {}
        }
        s = screen;
      }
      // If user stops screen-share via browser UI, end gracefully
      s.getVideoTracks().forEach(track => {
        track.addEventListener("ended", () => {
          if (recording) stopRecording();
        });
      });
      setStream(s);
      setPhase("record");
    } catch (e) {
      console.error("Source error:", e);
      setErrorMsg(e.name === "NotAllowedError"
        ? "Permission denied. Allow camera/microphone/screen access in your browser, then try again."
        : "Could not start " + kind + ": " + e.message);
    }
  };

  const startRecording = () => {
    if (!stream) return;
    const mimeType = pickMimeType();
    let r;
    try {
      r = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    } catch (e) {
      setErrorMsg("Your browser doesn't support video recording. Try Chrome, Edge, or Firefox.");
      return;
    }
    const localChunks = [];
    r.ondataavailable = (e) => { if (e.data.size > 0) localChunks.push(e.data); };
    r.onstop = () => {
      const finalBlob = new Blob(localChunks, { type: mimeType || "video/webm" });
      setRecordedBlob(finalBlob);
      setPreviewUrl(URL.createObjectURL(finalBlob));
      // Stop all tracks
      if (stream) stream.getTracks().forEach(t => t.stop());
      setStream(null);
      setRecording(false);
      setPhase("review");
    };
    r.start(1000); // 1s chunks
    setRecorder(r);
    setChunks(localChunks);
    setRecording(true);
    setDuration(0);
    timerRef.current = setInterval(() => setDuration(d => d + 1), 1000);
  };

  const stopRecording = () => {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    if (recorder && recorder.state !== "inactive") recorder.stop();
  };

  const onPickFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (!f.type.startsWith("video/")) {
      setErrorMsg("Please pick a video file (.mp4, .mov, .webm, etc.)");
      return;
    }
    setRecordedBlob(f);
    setPreviewUrl(URL.createObjectURL(f));
    setSource("upload");
    setDuration(0); // unknown until video metadata loads
    setPhase("review");
  };

  const upload = async () => {
    if (!recordedBlob || !auth?.session) return;
    setPhase("upload");
    setUploadPct(0);
    setErrorMsg(null);

    // Build object key: deckId/timestamp_random.ext
    const ext = (recordedBlob.type.includes("mp4") ? "mp4" :
                 recordedBlob.type.includes("quicktime") ? "mov" :
                 recordedBlob.type.includes("webm") ? "webm" : "webm");
    const objectKey = `recordings/${deckId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;

    try {
      // Step 1: ask our Netlify Function for a presigned upload URL
      const presignResp = await fetch(LH_CFG.UPLOAD_FUNCTION, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + auth.session.access_token
        },
        body: JSON.stringify({
          objectKey,
          contentType: recordedBlob.type || "video/webm"
        })
      });
      if (!presignResp.ok) {
        const txt = await presignResp.text();
        throw new Error("Upload prep failed: " + txt);
      }
      const { uploadUrl, publicUrl } = await presignResp.json();

      // Step 2: PUT the file directly to Spaces, with progress
      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", uploadUrl);
        xhr.setRequestHeader("Content-Type", recordedBlob.type || "video/webm");
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) setUploadPct(Math.round((e.loaded / e.total) * 100));
        };
        xhr.onload = () => xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error("Upload failed (" + xhr.status + ")"));
        xhr.onerror = () => reject(new Error("Network error during upload."));
        xhr.send(recordedBlob);
      });

      // Step 3: write a recordings entry to Supabase
      const recordingsKey = `lh:recordings:${deckId}`;
      const { data: existing } = await auth.supabase
        .from("app_state")
        .select("value")
        .eq("key", recordingsKey)
        .maybeSingle();
      const list = existing?.value || [];
      const meta = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
        url: publicUrl,
        objectKey,
        title: title.trim() || (source === "upload" ? recordedBlob.name : `Recording ${new Date().toLocaleString()}`),
        size: recordedBlob.size,
        contentType: recordedBlob.type || "video/webm",
        duration: duration || null,
        recordedBy: auth.profile?.email || auth.session.user.email,
        recordedAt: new Date().toISOString(),
        source: source
      };
      list.push(meta);

      await auth.supabase.from("app_state").upsert({
        key: recordingsKey,
        value: list,
        updated_by: auth.session.user.id,
        updated_at: new Date().toISOString()
      }, { onConflict: "key" });

      setPhase("done");
      onUploaded && onUploaded(meta);
    } catch (e) {
      console.error(e);
      setErrorMsg(e.message || "Upload failed.");
      setPhase("error");
    }
  };

  // ---- Render ------------------------------------------------------
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: "rgba(26,20,16,0.7)" }} onClick={phase === "upload" ? null : onClose}>
      <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[90vh] overflow-auto shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="p-7">
          <div className="flex items-start justify-between mb-2">
            <div>
              <h2 style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-2xl font-medium text-stone-900">
                {phase === "choose" && "Record a workshop session"}
                {phase === "record" && (recording ? "Recording…" : "Ready to record")}
                {phase === "review" && "Review your recording"}
                {phase === "upload" && "Uploading to shared library…"}
                {phase === "done" && "Saved to deck"}
                {phase === "error" && "Something went wrong"}
              </h2>
              <p className="text-sm text-stone-500 mt-0.5" style={{ fontFamily: "Manrope, sans-serif" }}>
                <span className="font-semibold" style={{ color: BRAND.purple }}>{deckTitle}</span>
              </p>
            </div>
            {phase !== "upload" && (
              <button onClick={onClose} className="p-1.5 rounded-full hover:bg-stone-100"><X size={18} /></button>
            )}
          </div>

          {errorMsg && (
            <div className="mt-4 p-3 rounded-xl bg-red-50 text-red-800 text-sm border border-red-100 flex items-start gap-2">
              <AlertCircle size={16} className="shrink-0 mt-0.5" />
              <span>{errorMsg}</span>
            </div>
          )}

          {/* PHASE: CHOOSE SOURCE ----------------------------------- */}
          {phase === "choose" && (
            <div className="mt-5">
              <p className="text-sm text-stone-600 mb-5" style={{ fontFamily: "Manrope, sans-serif" }}>
                Pick how you want to capture this workshop. The recording uploads to your shared library and shows up on this deck for the whole team.
              </p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <button onClick={() => startSource("screen")} className="text-left p-4 rounded-2xl border-2 border-stone-200 hover:border-stone-900 transition group">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `${BRAND.purpleDeep}15`, color: BRAND.purpleDeep }}>
                      <Monitor size={20} />
                    </div>
                    <div className="font-semibold text-stone-900">Screen + voice</div>
                  </div>
                  <div className="text-xs text-stone-500 leading-relaxed pl-1">Best for presenting the slides via Zoom or in this app. Captures your screen + your microphone.</div>
                </button>
                <button onClick={() => startSource("webcam")} className="text-left p-4 rounded-2xl border-2 border-stone-200 hover:border-stone-900 transition group">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `${BRAND.green}15`, color: BRAND.greenDeep }}>
                      <Camera size={20} />
                    </div>
                    <div className="font-semibold text-stone-900">Webcam + voice</div>
                  </div>
                  <div className="text-xs text-stone-500 leading-relaxed pl-1">Talking-head video. Good for intros, debriefs, or a quick announcement.</div>
                </button>
                <button onClick={() => fileInputRef.current?.click()} className="text-left p-4 rounded-2xl border-2 border-stone-200 hover:border-stone-900 transition group">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: `${BRAND.amber}20`, color: "#A86A1F" }}>
                      <Upload size={20} />
                    </div>
                    <div className="font-semibold text-stone-900">Upload existing video</div>
                  </div>
                  <div className="text-xs text-stone-500 leading-relaxed pl-1">For workshops you recorded on your phone. Pick any video file.</div>
                </button>
                <input ref={fileInputRef} type="file" accept="video/*" className="hidden" onChange={onPickFile} />
                <div className="p-4 rounded-2xl border-2 border-dashed border-stone-200 text-xs text-stone-500 leading-relaxed">
                  <div className="flex items-center gap-2 mb-2 text-stone-700 font-semibold">
                    <Lightbulb size={14} /> Tip
                  </div>
                  Workshops longer than 30 min — record on your phone, upload after. Browser recording works best for under 30 min.
                </div>
              </div>
            </div>
          )}

          {/* PHASE: RECORDING --------------------------------------- */}
          {phase === "record" && (
            <div className="mt-4">
              <div className="aspect-video bg-stone-900 rounded-2xl overflow-hidden flex items-center justify-center relative">
                <video ref={liveVideoRef} autoPlay muted playsInline className="w-full h-full object-contain" />
                {recording && (
                  <div className="absolute top-4 left-4 flex items-center gap-2 px-3 py-1.5 rounded-full text-white text-xs font-bold tracking-wider" style={{ background: "rgba(220,38,38,0.95)" }}>
                    <span className="w-2 h-2 rounded-full bg-white animate-pulse" /> REC · {formatDuration(duration)}
                  </div>
                )}
              </div>
              <div className="mt-5 flex items-center justify-center gap-3">
                {!recording ? (
                  <button
                    onClick={startRecording}
                    className="px-7 py-3.5 rounded-full text-white font-bold text-sm tracking-wider uppercase flex items-center gap-2 transition shadow-md hover:shadow-lg"
                    style={{ background: "#DC2626", fontFamily: "Manrope, sans-serif" }}
                  >
                    <Circle size={14} fill="white" /> Start recording
                  </button>
                ) : (
                  <button
                    onClick={stopRecording}
                    className="px-7 py-3.5 rounded-full text-white font-bold text-sm tracking-wider uppercase flex items-center gap-2 transition shadow-md"
                    style={{ background: "#1A1410", fontFamily: "Manrope, sans-serif" }}
                  >
                    <Square size={14} fill="white" /> Stop & review
                  </button>
                )}
              </div>
              <p className="text-center text-xs text-stone-400 mt-3">Source: {source === "screen" ? "Screen + audio" : source === "webcam" ? "Webcam + microphone" : "Screen + camera + audio"}</p>
            </div>
          )}

          {/* PHASE: REVIEW ------------------------------------------ */}
          {phase === "review" && (
            <div className="mt-4">
              <div className="aspect-video bg-stone-900 rounded-2xl overflow-hidden">
                <video ref={previewVideoRef} controls playsInline className="w-full h-full object-contain" onLoadedMetadata={(e) => { if (!duration && e.target.duration) setDuration(Math.round(e.target.duration)); }} />
              </div>
              <div className="mt-5 grid grid-cols-1 sm:grid-cols-3 gap-3 text-xs text-stone-500" style={{ fontFamily: "Manrope, sans-serif" }}>
                <div><strong className="text-stone-700">Size:</strong> {formatBytes(recordedBlob.size)}</div>
                <div><strong className="text-stone-700">Duration:</strong> {formatDuration(duration)}</div>
                <div><strong className="text-stone-700">Type:</strong> {recordedBlob.type || "video/webm"}</div>
              </div>
              <div className="mt-4">
                <label className="text-xs font-semibold uppercase tracking-widest text-stone-500 mb-1.5 block">Title (optional)</label>
                <input
                  value={title}
                  onChange={e => setTitle(e.target.value)}
                  placeholder={`e.g. "Live session — Aug 12 cohort"`}
                  className="w-full px-4 py-2.5 bg-white border border-stone-200 rounded-xl outline-none focus:border-stone-500"
                  style={{ fontFamily: "Manrope, sans-serif" }}
                />
              </div>
              <div className="mt-5 flex items-center justify-end gap-2">
                <button onClick={() => { setRecordedBlob(null); setPreviewUrl(null); setPhase("choose"); }} className="px-5 py-2.5 rounded-full text-sm font-semibold text-stone-700 bg-stone-100 hover:bg-stone-200 transition">
                  Discard & try again
                </button>
                <button onClick={upload} className="px-6 py-2.5 rounded-full text-sm font-semibold text-white transition shadow-sm flex items-center gap-2" style={{ background: BRAND.purpleDeep }}>
                  <Upload size={14} /> Save to deck
                </button>
              </div>
            </div>
          )}

          {/* PHASE: UPLOAD ------------------------------------------ */}
          {phase === "upload" && (
            <div className="mt-6 py-8">
              <div className="flex items-center justify-center mb-6">
                <Loader2 size={32} className="animate-spin" style={{ color: BRAND.purple }} />
              </div>
              <div className="max-w-md mx-auto">
                <div className="flex justify-between text-xs font-semibold mb-2">
                  <span className="text-stone-700">Uploading</span>
                  <span className="text-stone-700">{uploadPct}%</span>
                </div>
                <div className="h-2 bg-stone-100 rounded-full overflow-hidden">
                  <div className="h-full transition-all" style={{ width: uploadPct + "%", background: `linear-gradient(90deg, ${BRAND.purpleDeep} 0%, ${BRAND.green} 100%)` }} />
                </div>
                <p className="text-xs text-stone-400 mt-3 text-center">Don't close this window until it's done.</p>
              </div>
            </div>
          )}

          {/* PHASE: DONE -------------------------------------------- */}
          {phase === "done" && (
            <div className="mt-6 py-6 text-center">
              <div className="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center" style={{ background: `${BRAND.green}20`, color: BRAND.greenDeep }}>
                <Check size={28} />
              </div>
              <p className="text-lg font-semibold text-stone-900 mb-1" style={{ fontFamily: "Fraunces, Georgia, serif" }}>Saved to the shared library.</p>
              <p className="text-sm text-stone-500 mb-5">Your team will see this recording the next time they open this deck.</p>
              <button onClick={onClose} className="px-6 py-2.5 rounded-full text-sm font-semibold text-white transition" style={{ background: BRAND.purpleDeep }}>
                Done
              </button>
            </div>
          )}

          {/* PHASE: ERROR ------------------------------------------- */}
          {phase === "error" && (
            <div className="mt-6 flex justify-end gap-2">
              <button onClick={onClose} className="px-5 py-2.5 rounded-full text-sm font-semibold text-stone-700 bg-stone-100 hover:bg-stone-200">
                Close
              </button>
              <button onClick={() => { setErrorMsg(null); setPhase("review"); }} className="px-5 py-2.5 rounded-full text-sm font-semibold text-white" style={{ background: BRAND.purpleDeep }}>
                Try upload again
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// RECORDINGS PANEL — list + play recordings on a deck
// ---------------------------------------------------------------------
function RecordingsPanel({ deckId, deckTitle }) {
  const auth = useAuth();
  const [recordings, setRecordings] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [showRecorder, setShowRecorder] = useState(false);
  const [playing, setPlaying] = useState(null);
  const recordingsKey = `lh:recordings:${deckId}`;

  // Load + subscribe
  useEffect(() => {
    if (!auth?.supabase) return;
    let live = true;
    (async () => {
      const { data } = await auth.supabase
        .from("app_state").select("value").eq("key", recordingsKey).maybeSingle();
      if (!live) return;
      setRecordings(data?.value || []);
      setLoaded(true);
    })();
    const ch = auth.supabase
      .channel(`recordings:${deckId}`)
      .on("postgres_changes",
        { event: "*", schema: "public", table: "app_state", filter: `key=eq.${recordingsKey}` },
        (payload) => { if (live && payload.new?.value) setRecordings(payload.new.value); }
      ).subscribe();
    return () => { live = false; auth.supabase.removeChannel(ch); };
  }, [deckId, auth?.session?.user?.id]);

  const deleteRecording = async (rec) => {
    if (!confirm(`Delete "${rec.title}"? This removes it for everyone.`)) return;
    const next = recordings.filter(r => r.id !== rec.id);
    setRecordings(next);
    await auth.supabase.from("app_state").upsert({
      key: recordingsKey,
      value: next,
      updated_by: auth.session.user.id,
      updated_at: new Date().toISOString()
    }, { onConflict: "key" });
    // Note: we leave the file in Spaces (orphaned). A periodic cleanup script could prune these.
  };

  return (
    <div className="mt-8 pt-8 border-t border-stone-200">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h3 style={{ fontFamily: "Fraunces, Georgia, serif" }} className="text-2xl font-medium text-stone-900">
            Recordings <span className="text-stone-400 text-sm font-normal">{recordings.length > 0 ? `(${recordings.length})` : ""}</span>
          </h3>
          <p className="text-sm text-stone-500 mt-0.5">Live sessions, walkthroughs, examples — for the whole team.</p>
        </div>
        <button onClick={() => setShowRecorder(true)} className="px-4 py-2 rounded-full text-sm font-semibold text-white flex items-center gap-2 transition shadow-sm" style={{ background: "#DC2626", fontFamily: "Manrope, sans-serif" }}>
          <Video size={14} /> Record / upload
        </button>
      </div>

      {loaded && recordings.length === 0 && (
        <div className="text-center py-10 px-6 rounded-2xl border-2 border-dashed border-stone-200">
          <FileVideo size={28} className="mx-auto text-stone-300 mb-2" />
          <p className="text-sm text-stone-500">No recordings yet. Click "Record / upload" to add the first one.</p>
        </div>
      )}

      {recordings.length > 0 && (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {recordings.map(rec => (
            <div key={rec.id} className="border border-stone-200 rounded-2xl overflow-hidden bg-white">
              <div className="aspect-video bg-stone-900 relative cursor-pointer" onClick={() => setPlaying(rec.id === playing ? null : rec.id)}>
                {playing === rec.id ? (
                  <video src={rec.url} controls autoPlay playsInline className="w-full h-full object-contain" />
                ) : (
                  <div className="w-full h-full flex flex-col items-center justify-center hover:bg-stone-800 transition">
                    <div className="w-16 h-16 rounded-full bg-white/95 flex items-center justify-center mb-2">
                      <Play size={26} fill="currentColor" style={{ color: "#1A1410", marginLeft: 3 }} />
                    </div>
                    {rec.duration && <span className="absolute bottom-3 right-3 px-2 py-0.5 bg-black/70 text-white text-xs rounded font-mono">{formatDuration(rec.duration)}</span>}
                  </div>
                )}
              </div>
              <div className="p-4 flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <div className="font-semibold text-stone-900 text-sm truncate" style={{ fontFamily: "Fraunces, Georgia, serif" }}>{rec.title}</div>
                  <div className="text-xs text-stone-500 mt-1 truncate">
                    {rec.recordedBy && <span>{rec.recordedBy.split("@")[0]} · </span>}
                    {new Date(rec.recordedAt).toLocaleDateString()} · {formatBytes(rec.size)}
                  </div>
                </div>
                <div className="flex items-center gap-1 shrink-0">
                  <a href={rec.url} target="_blank" rel="noopener noreferrer" download className="p-1.5 rounded-full hover:bg-stone-100 text-stone-500 hover:text-stone-900" title="Download">
                    <Download size={14} />
                  </a>
                  <button onClick={() => deleteRecording(rec)} className="p-1.5 rounded-full hover:bg-red-50 text-stone-400 hover:text-red-600" title="Delete">
                    <Trash2 size={14} />
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {showRecorder && (
        <RecorderModal
          deckId={deckId}
          deckTitle={deckTitle}
          onClose={() => setShowRecorder(false)}
          onUploaded={() => { /* realtime will update list */ }}
        />
      )}
    </div>
  );
}

// MAIN APP

function App() {
  const auth = useAuth();
  const [view, setView] = useState("catalog");
  const [openId, setOpenId] = useState(null);
  const [presenting, setPresenting] = useState(false);
  const [showWorksheet, setShowWorksheet] = useState(false);
  const [showNewDialog, setShowNewDialog] = useState(false);
  const [showTeamPanel, setShowTeamPanel] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [showUserMenu, setShowUserMenu] = useState(false);
  const [search, setSearch] = useState("");
  const [edits, setEdits] = useStorage("lh:edits:v1", {});
  const [customDecks, setCustomDecks] = useStorage("lh:custom-decks:v1", {});

  // Resolve full deck list with overrides
  const allDecks = useMemo(() => {
    const out = {};
    Object.entries(DECKS).forEach(([id, d]) => {
      out[id] = edits[id] || d;
    });
    return out;
  }, [edits]);

  const customList = useMemo(() => Object.entries(customDecks).map(([id, d]) => ({ id, ...d })), [customDecks]);

  const openDeck = openId ? (customDecks[openId] ? { ...customDecks[openId], _isCustom: true } : allDecks[openId]) : null;
  const openIsCustom = openId ? !!customDecks[openId] : false;

  const handleSaveDeck = (next) => {
    if (openIsCustom) {
      setCustomDecks({ ...customDecks, [openId]: next });
    } else {
      setEdits({ ...edits, [openId]: next });
    }
  };

  const handleResetDeck = () => {
    if (!openId || openIsCustom) return;
    if (!window.confirm("Reset this workshop to the original content? Your edits will be lost.")) return;
    const next = { ...edits };
    delete next[openId];
    setEdits(next);
  };

  const handleDeleteCustom = () => {
    if (!window.confirm("Delete this custom workshop permanently?")) return;
    const next = { ...customDecks };
    delete next[openId];
    setCustomDecks(next);
    setOpenId(null);
    setView("catalog");
  };

  const handleCreateCustom = (id, deck) => {
    setCustomDecks({ ...customDecks, [id]: deck });
    setShowNewDialog(false);
    setOpenId(id);
    setView("deck");
  };

  // FONTS injected once
  useEffect(() => {
    if (document.getElementById("lh-fonts")) return;
    const link = document.createElement("link");
    link.id = "lh-fonts";
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@400;500;600;700&display=swap";
    document.head.appendChild(link);
    document.body.style.background = BRAND.cream;
    document.body.style.fontFamily = "Manrope, ui-sans-serif, system-ui, sans-serif";
  }, []);

  // Deep-link sharing: ?deck=ID opens that deck. Runs once after data is ready.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const deckParam = params.get("deck");
    if (!deckParam) return;
    // Wait until decks are loaded (built-in always available; custom needs the customDecks fetch to finish)
    const exists = DECKS[deckParam] || customDecks[deckParam];
    if (exists) {
      setOpenId(deckParam);
      setView("deck");
    }
    // Don't strip the param — keep it so refreshing keeps the deck open
  }, [customDecks]);

  // Keep URL in sync when user navigates between catalog and a deck
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (view === "deck" && openId) {
      if (params.get("deck") !== openId) {
        params.set("deck", openId);
        window.history.replaceState(null, "", window.location.pathname + "?" + params.toString());
      }
    } else if (view === "catalog") {
      if (params.has("deck")) {
        params.delete("deck");
        const q = params.toString();
        window.history.replaceState(null, "", window.location.pathname + (q ? "?" + q : ""));
      }
    }
  }, [view, openId]);

  return (
    <div className="min-h-screen flex flex-col" style={{ background: BRAND.cream, fontFamily: "Manrope, sans-serif", color: BRAND.ink }}>
      {/* TOP BAR */}
      <header className="border-b border-stone-200 sticky top-0 z-20 backdrop-blur" style={{ background: "rgba(250,246,238,0.92)" }}>
        <div className="max-w-7xl mx-auto px-8 lg:px-16 py-4 flex items-center justify-between gap-4">
          <button onClick={() => { setView("catalog"); setOpenId(null); }} className="cursor-pointer">
            <Logo size="md" />
          </button>
          <div className="flex items-center gap-3">
            {/* Sync indicator */}
            <span className="hidden md:inline-flex items-center gap-1.5 text-[10px] font-semibold tracking-widest uppercase text-stone-500" title="Library is shared with your team via Supabase">
              <Cloud size={12} style={{ color: BRAND.green }} /> Shared library · live sync
            </span>
            {/* User menu */}
            {auth?.profile && (
              <div className="relative">
                <button
                  onClick={() => setShowUserMenu(v => !v)}
                  className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white border border-stone-200 hover:border-stone-400 transition"
                >
                  <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{ background: auth.profile.role === "admin" ? BRAND.purpleDeep : BRAND.green }}>
                    {(auth.profile.name || auth.profile.email || "?").charAt(0).toUpperCase()}
                  </div>
                  <span className="hidden sm:inline text-xs font-semibold text-stone-700 max-w-[160px] truncate">
                    {auth.profile.name || auth.profile.email}
                  </span>
                </button>
                {showUserMenu && (
                  <>
                    <div className="fixed inset-0 z-30" onClick={() => setShowUserMenu(false)} />
                    <div className="absolute right-0 top-full mt-2 w-64 bg-white border border-stone-200 rounded-2xl shadow-lg p-2 z-40">
                      <div className="px-3 py-3 border-b border-stone-100 mb-1">
                        <div className="text-sm font-semibold text-stone-900 truncate">{auth.profile.name || auth.profile.email.split("@")[0]}</div>
                        <div className="text-xs text-stone-500 truncate">{auth.profile.email}</div>
                        {auth.profile.role === "admin" && (
                          <div className="inline-block mt-2 text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full" style={{ background: `${BRAND.purpleDeep}15`, color: BRAND.purpleDeep }}>
                            Admin
                          </div>
                        )}
                      </div>
                      {auth.profile.role === "admin" && (
                        <button
                          onClick={() => { setShowTeamPanel(true); setShowUserMenu(false); }}
                          className="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-stone-50 transition flex items-center gap-2.5"
                        >
                          <Users size={14} className="text-stone-500" /> Manage team
                        </button>
                      )}
                      <button
                        onClick={() => { auth.signOut(); setShowUserMenu(false); }}
                        className="w-full text-left px-3 py-2 text-sm rounded-lg hover:bg-stone-50 transition flex items-center gap-2.5 text-red-600"
                      >
                        <LogOut size={14} /> Sign out
                      </button>
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      </header>

      {/* MAIN */}
      <main className="flex-1 flex flex-col">
        {view === "catalog" && (
          <CatalogView
            allDecks={allDecks}
            customDecks={customList}
            search={search}
            setSearch={setSearch}
            onOpen={(id) => { setOpenId(id); setView("deck"); }}
            onNewCustom={() => setShowNewDialog(true)}
          />
        )}
        {view === "deck" && openDeck && (
          <DeckView
            deck={openDeck}
            deckId={openId}
            isCustom={openIsCustom}
            onBack={() => { setView("catalog"); setOpenId(null); }}
            onPresent={() => setPresenting(true)}
            onSave={handleSaveDeck}
            onReset={handleResetDeck}
            onDeleteCustom={handleDeleteCustom}
            onShowWorksheet={() => setShowWorksheet(true)}
            onShowExport={() => setShowExport(true)}
          />
        )}
      </main>

      {/* FOOTER */}
      <footer className="border-t border-stone-200 py-8 px-8 lg:px-16" style={{ background: BRAND.paper }}>
