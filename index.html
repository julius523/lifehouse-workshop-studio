  <script type="importmap">
  {
    "imports": {

  <style>
    html, body { background: #FAF6EE; }
    body { font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    /* Splash while Babel compiles */
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; background: #FAF6EE; z-index: 0;
    }
    #boot .lh-mark { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: #3E1E62; }
    #boot .lh-mark span { color: #1FAE7C; }
    #boot .lh-tag { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-size: 13px; color: #6B6056; }
    #boot .lh-spin { width: 20px; height: 20px; border: 2px solid #E6DFD0; border-top-color: #5B2D8A; border-radius: 50%; animation: lh-spin 0.8s linear infinite; margin-top: 8px; }
    @keyframes lh-spin { to { transform: rotate(360deg); } }
    @media print {
      #boot { display: none !important; }
      header, footer, .print\:hidden { display: none !important; }
    }

    /* ---- THEME-AWARE OVERRIDES ----
       For dark themes (Midnight, Bold), Tailwind's stone-* text colors render too dark.
       We mark the slide container with data-theme-mode="dark" and override specific
       text classes inside it. Same for the bg-white inner overlays.
    */
    [data-theme-mode="dark"] .text-stone-900,
    [data-theme-mode="dark"] .text-stone-800 { color: var(--lh-ink, #F5EFE6) !important; }
    [data-theme-mode="dark"] .text-stone-700,
    [data-theme-mode="dark"] .text-stone-600 { color: var(--lh-ink-soft, #C7BBD1) !important; }
    [data-theme-mode="dark"] .text-stone-500 { color: var(--lh-ink-soft, #9C8FAA) !important; }
    [data-theme-mode="dark"] .bg-white { background: var(--lh-paper, #2A1D3F) !important; }

    /* ---- TRANSITIONS ---- */
    @keyframes lh-fade-in   { from { opacity: 0 } to { opacity: 1 } }
    @keyframes lh-slide-in  { from { opacity: 0; transform: translateX(40px) } to { opacity: 1; transform: translateX(0) } }
    @keyframes lh-zoom-in   { from { opacity: 0; transform: scale(0.94) } to { opacity: 1; transform: scale(1) } }
    @keyframes lh-flip-in   { from { opacity: 0; transform: perspective(1200px) rotateY(15deg) translateX(30px) } to { opacity: 1; transform: perspective(1200px) rotateY(0) translateX(0) } }
    @keyframes lh-bullet-in { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
    .lh-anim-smooth { animation: lh-fade-in 0.45s ease-out; }
    .lh-anim-lively { animation: lh-zoom-in 0.55s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    .lh-bullet-anim { animation: lh-bullet-in 0.4s ease-out backwards; }

    /* ---- PRESENTATION PRINT MODE (triggered via .lh-printing on <body>) ---- */
    /* Hide print region by default. Only show during actual printing or when on-screen
       preview is needed (we keep it hidden on-screen and only let it render at print time). */
    @page lh-landscape {
      size: 11in 8.5in landscape;
      margin: 0;
    }
    /* On screen: print region is invisible but still in the DOM (so React keeps it mounted) */
    #lh-print-region {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 11in;
      pointer-events: none;
      opacity: 0;
    }
    /* In print mode (after we add body.lh-printing AND the browser is rendering @media print): */
    @media print {
      body.lh-printing { background: white !important; }
      body.lh-printing #root,
      body.lh-printing #boot,
      body.lh-printing > header,
      body.lh-printing > footer { display: none !important; }
      body.lh-printing #lh-print-region {
        position: static !important;
        left: auto !important;
        top: auto !important;
        width: auto !important;
        opacity: 1 !important;
        display: block !important;
      }
      body.lh-printing #lh-print-region .lh-print-slide {
        page: lh-landscape;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      body.lh-printing #lh-print-region .lh-print-slide:last-child {
        page-break-after: auto;
        break-after: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Splash screen — shown until React mounts -->
  <div id="boot">
    <div class="lh-mark">life<span>house</span></div>
    <div class="lh-tag">home, for good.</div>
    <div class="lh-spin"></div>
  </div>

  <!-- Mount target -->
  <div id="root"></div>

  <!-- The app -->
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef, useMemo } from "react";
    import { createRoot } from "react-dom/client";
    import { createPortal } from "react-dom";
    import {
      Home, ChevronLeft, ChevronRight, Edit3, Save, RotateCcw, Printer,
      Search, X, Menu, Check, Sparkles, BookOpen, Users, Heart,
      Briefcase, DollarSign, Trees, Compass, Stethoscope, Brain,
      Shield, Star, ArrowRight, MessageCircle, ClipboardCheck,
      Lightbulb, Target, Award, Phone, Maximize2, Minimize2,
      Lock, Mail, LogOut, UserPlus, Cloud, CloudOff, AlertCircle, Loader2, Eye, EyeOff,
      Video, Mic, MicOff, VideoOff, Square, Circle, Upload, Trash2,
      Play, Pause, Monitor, Camera, FileVideo, Download,
      Image, ImagePlus, ImageOff, ExternalLink,
      Share2, Link as LinkIcon, Copy, FileText, Presentation as PresentationIcon, GripVertical
    } from "lucide-react";
    import { createClient } from "@supabase/supabase-js";
    import PptxGenJS from "pptxgenjs";

    /* ==========================================================================
       SUPABASE CLIENT + AUTH GATE
       ========================================================================== */
    const LH_CFG = window.LH_CONFIG || {};
    const SUPABASE_CONFIGURED = LH_CFG.SUPABASE_URL && !LH_CFG.SUPABASE_URL.startsWith("PASTE_") &&
                                LH_CFG.SUPABASE_ANON_KEY && !LH_CFG.SUPABASE_ANON_KEY.startsWith("PASTE_");
    const supabase = SUPABASE_CONFIGURED
      ? createClient(LH_CFG.SUPABASE_URL, LH_CFG.SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
        })
      : null;

    // ---- Setup-needed screen --------------------------------------------------
    function SetupNeededScreen() {
      return (
        <div style={{
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          padding:"24px", background:"#FAF6EE"
        }}>
          <div style={{ maxWidth:"560px", width:"100%", background:"white", border:"1px solid #E6DFD0", borderRadius:"20px", padding:"36px 32px", boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
            <div style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"30px", fontWeight:600, letterSpacing:"-0.02em", color:"#3E1E62", marginBottom:"6px" }}>
              life<span style={{ color:"#1FAE7C" }}>house</span>
            </div>
            <div style={{ fontFamily:"Fraunces, Georgia, serif", fontStyle:"italic", color:"#6B6056", fontSize:"14px", marginBottom:"24px" }}>
              "Home, for good."
            </div>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"6px", padding:"4px 10px", background:"#FEF3C7", color:"#92400E", borderRadius:"999px", fontSize:"11px", fontWeight:600, letterSpacing:"0.05em", textTransform:"uppercase", marginBottom:"16px" }}>
              <AlertCircle size={12} /> Setup needed
            </div>
            <h2 style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"22px", fontWeight:500, color:"#1A1410", margin:"0 0 12px", lineHeight:"1.25" }}>
              Connect this site to Supabase to turn on shared library &amp; team login.
            </h2>
            <p style={{ color:"#3D332B", fontSize:"14px", lineHeight:1.55, margin:"0 0 18px" }}>
              Open <code style={{ background:"#FAF6EE", padding:"2px 6px", borderRadius:"4px", fontSize:"12px" }}>index.html</code> in any text editor, find the <code style={{ background:"#FAF6EE", padding:"2px 6px", borderRadius:"4px", fontSize:"12px" }}>window.LH_CONFIG</code> block near the top, and paste your Supabase URL and anon key.
            </p>
            <p style={{ color:"#6B6056", fontSize:"13px", lineHeight:1.5, margin:0 }}>
              Step-by-step instructions are in <strong>DEPLOY.md</strong> (in the same folder as this file). Takes about 10 minutes.
            </p>
          </div>
        </div>
      );
    }

    // ---- Login / Forgot password / Reset password screens --------------------
    function LoginScreen({ onSignedIn }) {
      const [mode, setMode] = useState("signin"); // signin | forgot | reset
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [showPw, setShowPw] = useState(false);
      const [busy, setBusy] = useState(false);
      const [msg, setMsg] = useState(null); // { type: 'error'|'success', text }

      // Detect "reset password" hash from email link
      useEffect(() => {
        if (window.location.hash.includes("type=recovery")) {
          setMode("reset");
        }
        const { data: sub } = supabase.auth.onAuthStateChange((event) => {
          if (event === "PASSWORD_RECOVERY") setMode("reset");
        });
        return () => sub.subscription.unsubscribe();
      }, []);

      const signIn = async () => {
        setBusy(true); setMsg(null);
        const { error } = await supabase.auth.signInWithPassword({ email: email.trim().toLowerCase(), password });
        setBusy(false);
        if (error) setMsg({ type:"error", text: error.message });
        else onSignedIn();
      };
      const sendReset = async () => {
        if (!email.trim()) { setMsg({ type:"error", text:"Enter your email first."}); return; }
        setBusy(true); setMsg(null);
        const redirectTo = window.location.origin + window.location.pathname;
        const { error } = await supabase.auth.resetPasswordForEmail(email.trim().toLowerCase(), { redirectTo });
        setBusy(false);
        if (error) setMsg({ type:"error", text: error.message });
        else setMsg({ type:"success", text:"Check your email for the reset link." });
      };
      const updatePw = async () => {
        if (password.length < 8) { setMsg({ type:"error", text:"Password must be at least 8 characters." }); return; }
        setBusy(true); setMsg(null);
        const { error } = await supabase.auth.updateUser({ password });
        setBusy(false);
        if (error) setMsg({ type:"error", text: error.message });
        else {
          window.location.hash = "";
          setMode("signin");
          setMsg({ type:"success", text:"Password updated. Sign in with your new password." });
          setPassword("");
        }
      };

      const fld = "w-full px-4 py-3 bg-white border border-stone-200 rounded-xl text-stone-900 outline-none focus:border-stone-500 transition";
      const lbl = "text-xs font-semibold uppercase tracking-widest text-stone-600 mb-1.5 block";

      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-8" style={{ background: "#FAF6EE", fontFamily:"Manrope, sans-serif" }}>
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"36px", fontWeight:600, letterSpacing:"-0.02em", color:"#3E1E62", lineHeight:1 }}>
                life<span style={{ color:"#1FAE7C" }}>house</span>
              </div>
              <div style={{ fontFamily:"Fraunces, Georgia, serif", fontStyle:"italic", color:"#6B6056", fontSize:"14px", marginTop:"6px" }}>
                "Home, for good."
              </div>
            </div>

            <div className="bg-white border border-stone-200 rounded-3xl p-8 shadow-sm">
              <h1 style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"26px", fontWeight:500, letterSpacing:"-0.01em", color:"#1A1410", lineHeight:1.15, margin:"0 0 6px" }}>
                {mode === "signin" && "Workshop Studio"}
                {mode === "forgot" && "Reset your password"}
                {mode === "reset"  && "Set a new password"}
              </h1>
              <p className="text-sm text-stone-500 mb-6" style={{ fontFamily:"Manrope, sans-serif" }}>
                {mode === "signin" && "Sign in with your team email and password."}
                {mode === "forgot" && "We'll email you a link to reset it."}
                {mode === "reset"  && "Type your new password below."}
              </p>

              {msg && (
                <div className={`mb-4 p-3 rounded-xl text-sm flex items-start gap-2 ${msg.type === "error" ? "bg-red-50 text-red-800 border border-red-100" : "bg-emerald-50 text-emerald-800 border border-emerald-100"}`}>
                  <AlertCircle size={16} className="shrink-0 mt-0.5" />
                  <span>{msg.text}</span>
                </div>
              )}

              {mode !== "reset" && (
                <div className="mb-4">
                  <label className={lbl}>Email</label>
                  <div className="relative">
                    <Mail size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400" />
                    <input
                      type="email" autoComplete="email" value={email} onChange={e => setEmail(e.target.value)}
                      placeholder="you@lifehousereentry.com"
                      className={fld + " pl-10"}
                      onKeyDown={e => e.key === "Enter" && (mode === "signin" ? signIn() : sendReset())}
                    />
                  </div>
                </div>
              )}
              {mode !== "forgot" && (
                <div className="mb-2">
                  <label className={lbl}>{mode === "reset" ? "New password" : "Password"}</label>
                  <div className="relative">
                    <Lock size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400" />
                    <input
                      type={showPw ? "text" : "password"} autoComplete={mode === "reset" ? "new-password" : "current-password"}
                      value={password} onChange={e => setPassword(e.target.value)}
                      placeholder="••••••••"
                      className={fld + " pl-10 pr-10"}
                      onKeyDown={e => e.key === "Enter" && (mode === "signin" ? signIn() : updatePw())}
                    />
                    <button type="button" onClick={() => setShowPw(v => !v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-700 p-1">
                      {showPw ? <EyeOff size={16} /> : <Eye size={16} />}
                    </button>
                  </div>
                </div>
              )}

              {mode === "signin" && (
                <button type="button" onClick={() => { setMode("forgot"); setMsg(null); }} className="text-xs font-semibold text-stone-500 hover:text-stone-900 mb-4 mt-1.5 transition">
                  Forgot password?
                </button>
              )}

              <button
                onClick={mode === "signin" ? signIn : mode === "forgot" ? sendReset : updatePw}
                disabled={busy}
                className="w-full mt-3 py-3.5 rounded-full font-semibold text-white transition flex items-center justify-center gap-2 disabled:opacity-60"
                style={{ background:"#3E1E62", fontFamily:"Manrope, sans-serif" }}
              >
                {busy && <Loader2 size={16} className="animate-spin" />}
                {mode === "signin" && (busy ? "Signing in…" : "Sign in")}
                {mode === "forgot" && (busy ? "Sending…"   : "Send reset link")}
                {mode === "reset"  && (busy ? "Saving…"    : "Save new password")}
              </button>

              {mode !== "signin" && (
                <button onClick={() => { setMode("signin"); setMsg(null); }} className="w-full mt-3 py-2.5 text-sm font-semibold text-stone-600 hover:text-stone-900 transition">
                  ← Back to sign in
                </button>
              )}
            </div>

            <p className="text-center text-xs text-stone-500 mt-6" style={{ fontFamily:"Manrope, sans-serif" }}>
              Restricted to <strong style={{ color:"#3E1E62" }}>@{LH_CFG.ALLOWED_DOMAIN}</strong> accounts.<br/>
              Need access? Contact julius@{LH_CFG.ALLOWED_DOMAIN}.
            </p>
          </div>
        </div>
      );
    }

    // ---- Auth context (the rest of the app reads `useAuth()`) ----------------
    const AuthCtx = React.createContext(null);
    const useAuth = () => React.useContext(AuthCtx);

    // ---- PUBLIC VIEWER ----
    // Read-only view of a published deck. No login required.
    // Anyone with the ?public=DECK_ID link can view, present, and download.
    // They cannot edit, share-edit, or delete.
    function PublicViewer({ deckId }) {
      const [deck, setDeck] = useState(null);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [presenting, setPresenting] = useState(false);
      const [showExport, setShowExport] = useState(false);

      useEffect(() => {
        // Add noindex so search engines don't index public decks
        const meta = document.createElement("meta");
        meta.name = "robots";
        meta.content = "noindex, nofollow";
        document.head.appendChild(meta);
        return () => { try { document.head.removeChild(meta); } catch (e) {} };
      }, []);

      useEffect(() => {
        let live = true;
        (async () => {
          try {
            // The 'anon read' RLS policy allows this fetch without a session.
            const { data, error } = await supabase
              .from("public_decks")
              .select("snapshot, published_at, updated_at")
              .eq("deck_id", deckId)
              .maybeSingle();
            if (!live) return;
            if (error) { setError(error.message); setLoading(false); return; }
            if (!data) {
              setError("This workshop link isn't valid, or it's no longer published. Ask the person who shared it for an updated link.");
              setLoading(false);
              return;
            }
            setDeck(data.snapshot);
          } catch (e) {
            if (live) setError(e.message);
          }
          if (live) setLoading(false);
        })();
        return () => { live = false; };
      }, [deckId]);

      if (loading) {
        return (
          <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#FAF6EE" }}>
            <Loader2 size={28} className="animate-spin" style={{ color:"#5B2D8A" }} />
          </div>
        );
      }

      if (error) {
        return (
          <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:"24px", background:"#FAF6EE", fontFamily:"Manrope, sans-serif" }}>
            <div style={{ maxWidth:"560px", width:"100%", background:"white", border:"1px solid #E6DFD0", borderRadius:"20px", padding:"36px 32px", textAlign:"center", boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
              <div style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"28px", fontWeight:600, color:"#3E1E62", marginBottom:"6px" }}>
                life<span style={{ color:"#1FAE7C" }}>house</span>
              </div>
              <div style={{ fontFamily:"Fraunces, Georgia, serif", fontStyle:"italic", color:"#6B6056", fontSize:"13px", marginBottom:"24px" }}>"Home, for good."</div>
              <h2 style={{ fontFamily:"Fraunces, Georgia, serif", fontSize:"22px", fontWeight:500, color:"#1A1410", margin:"0 0 12px" }}>
                Workshop unavailable
              </h2>
              <p style={{ color:"#3D332B", fontSize:"14px", lineHeight:1.55, margin:0 }}>{error}</p>
            </div>
          </div>
        );
      }

      if (presenting) {
        return <Presentation deck={deck} onClose={() => setPresenting(false)} />;
      }

      // Public read-only deck view
      return (
        <div className="min-h-screen flex flex-col" style={{ background: BRAND.cream, fontFamily: "Manrope, sans-serif", color: BRAND.ink }}>
          <header className="border-b border-stone-200" style={{ background: "rgba(250,246,238,0.92)" }}>
            <div className="max-w-7xl mx-auto px-6 lg:px-12 py-4 flex items-center justify-between gap-4">
              <a href="https://lifehousereentry.com" target="_blank" rel="noopener noreferrer" className="cursor-pointer">
                <Logo size="md" />
              </a>
              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => setShowExport(true)} className="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1.5 text-stone-700 bg-stone-100 hover:bg-stone-200 transition" title="Download as PDF or PowerPoint">
                  <Download size={14} /> Download
                </button>
                <button onClick={() => setPresenting(true)} className="px-5 py-2 rounded-full text-sm font-semibold text-white flex items-center gap-2 transition shadow-sm" style={{ background: BRAND.purpleDeep }}>
                  <Maximize2 size={14} /> Present
                </button>
              </div>

    function AuthGate({ children }) {
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [recovery, setRecovery] = useState(window.location.hash.includes("type=recovery"));

      useEffect(() => {
        if (!supabase) { setLoading(false); return; }
        let live = true;
        supabase.auth.getSession().then(({ data }) => { if (live) { setSession(data.session); if (!data.session) setLoading(false); } });
        const { data: sub } = supabase.auth.onAuthStateChange((event, sess) => {
          if (event === "PASSWORD_RECOVERY") setRecovery(true);
          setSession(sess);
          if (!sess) { setProfile(null); setLoading(false); }
        });
        return () => { live = false; sub.subscription.unsubscribe(); };
      }, []);

      // Load profile (role) when session changes
      useEffect(() => {
        if (!session) return;
        let live = true;
        (async () => {
          // First, ensure profile row exists
          const u = session.user;
          const { data: existing } = await supabase.from("profiles").select("*").eq("id", u.id).maybeSingle();
          if (!live) return;
          if (existing) {
            setProfile(existing);
          } else {
            // Auto-create a profile row on first login (the SQL trigger should do this,
            // but this is a safety net)
            const isAdmin = u.email && u.email.toLowerCase() === ("julius@" + LH_CFG.ALLOWED_DOMAIN).toLowerCase();
            const { data: created } = await supabase.from("profiles").insert({
              id: u.id,
              email: u.email,
              role: isAdmin ? "admin" : "member",
              name: (u.email || "").split("@")[0]
            }).select().single();
            if (live) setProfile(created || { id: u.id, email: u.email, role: isAdmin ? "admin" : "member" });
          }
          setLoading(false);
        })();
        return () => { live = false; };
      }, [session]);

      const signOut = async () => {
        await supabase.auth.signOut();
        setSession(null); setProfile(null);
      };

      if (!SUPABASE_CONFIGURED) return <SetupNeededScreen />;

      // ---- PUBLIC VIEWER short-circuit ----
      // If URL has ?public=DECK_ID, skip auth and render the public viewer instead.
      const urlParams = new URLSearchParams(window.location.search);
      const publicId = urlParams.get("public");
      if (publicId) {
        return <PublicViewer deckId={publicId} />;
      }

      if (recovery) return <LoginScreen onSignedIn={() => {}} />;
      if (!session) return <LoginScreen onSignedIn={() => {}} />;
      if (loading) {
        return (
          <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#FAF6EE" }}>
            <Loader2 size={28} className="animate-spin" style={{ color:"#5B2D8A" }} />
          </div>
        );
      }

      return (
        <AuthCtx.Provider value={{ session, profile, signOut, supabase }}>
          {children}
        </AuthCtx.Provider>
      );
    }

    /* ==========================================================================
       END AUTH BLOCK
       ========================================================================== */

  "teen-development": {
    title: "Teen Development: How to Stay Connected",
    category: "relationships",
    duration: "2 hours",
    slides: [
      s("title", { title: "Teen Development: How to Stay Connected", tagline: "Their job is to pull away. Your job is to stay reachable." }),
      s("why", { hook: "The teen brain is under construction until age 25. The risk-taking part is done at 16. The 'pause and think' part isn't.", body: "If you're parenting (or re-parenting) a teen, you're not raising a small adult. You're co-piloting a brain that's literally rewiring itself. Today: how to stay close without smothering." }),
      s("objectives", { items: ["Understand what's biological vs personal", "Master the 'one-question rule' (instead of 20 questions)", "Use 'I noticed' instead of 'why' to open conversations", "Know the warning signs that need professional help"] }),
      s("concept", { title: "Connection > control", body: "You cannot out-rule a teenager. You CAN out-relationship them. Teens don't tell their parents the truth because parents react. The job is to be the one adult who hears it without flipping out — even when the news is bad." }),
      s("deepdive", { title: "Tools that work", items: ["**One-question rule:** ask ONE question and let it sit. Silence isn't rejection — it's processing.", "**'I noticed':** 'I noticed you've been quiet this week' opens. 'Why are you so quiet?' closes.", "**Side-by-side conversations:** car rides, walks, dishes — not eye-contact interrogations", "**Warning signs:** sudden grade drop, friend group shift, sleep changes, talking about being a burden, giving things away — these mean call a professional"] }),
      s("case", { name: "Antoine and his 15-year-old son", scenario: "Antoine came back from prison when his son was 13. By 15, the son barely spoke to him. Antoine was hurt, then angry. We coached him: stop demanding talks, start showing up at games and just driving home in silence. Within 2 months the son was talking. Not about big things. About basketball, then a girl, then — eventually — about how it felt when dad was gone. Connection took eight months. It worked because he stayed put." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What does YOUR teen do that scares or hurts you most? Is it biological or personal?", "When you were a teen, who was the adult who 'got' you? What did they do?", "What would 'staying reachable' cost you — and what's the cost of NOT?"] }),
      s("activity", { title: "Activity: The Side-By-Side Plan (20 min)", instructions: "Plan ONE side-by-side activity this week (drive, walk, cook together, watch their show). Write 3 'I noticed' openers. Practice the silence — count to 30 in your head before filling it." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["One side-by-side activity scheduled", "Three 'I noticed' openers", "Your warning-signs checklist (saved on your phone)", "Who you'll call if those signs appear"] }),
      s("outcome", { title: "You walk out today with…", items: ["Less worry that they're 'just being mean'", "A specific connection plan", "Words that don't shut them down", "Knowing when to escalate — and to whom"] }),
      s("resources", { items: ["988 (Suicide & Crisis Lifeline) — teens can text too", "Sacramento County Mental Health Access: 916-875-1055", "The Teenage Brain by Frances Jensen (book)", "Childmind.org — free parent guides"] })
    ]
  },

  "dv-awareness": {
    title: "Domestic Violence: Awareness & Safe Pathways",
    category: "relationships",
    duration: "2 hours",
    slides: [
      s("title", { title: "Domestic Violence: Awareness & Safe Pathways", tagline: "Information, not pressure. You decide what's next." }),
      s("why", { hook: "Leaving is the most dangerous moment. That's why we plan — not push.", body: "Whether this is about you, someone you love, or a client you'll work with, the rules are the same: respect autonomy, share information, build safety in layers, never shame. Today is about real options." }),
      s("objectives", { items: ["Recognize the cycle of violence and the power & control wheel", "Build a safety plan (whether you stay or go)", "Know Sacramento-specific resources by name", "Practice non-judgmental support language"] }),
      s("concept", { title: "Abuse is about power, not anger", body: "If your partner can control their temper at work, with their boss, or in public, but 'loses it' with you — that's not anger management. That's targeted control. The pattern: tension builds, incident, honeymoon, repeat. Each cycle gets shorter and more severe." }),
      s("deepdive", { title: "Safety planning basics", items: ["**Stay-safety plan:** safe room, signal to a neighbor, kids' code word, hidden go-bag", "**Leave-safety plan:** money, IDs, documents, meds copied and stashed with someone you trust", "**Tech safety:** new email account ON A DIFFERENT DEVICE, location services off, check car for AirTags", "**Restraining orders:** free help filing through WEAVE — they walk you through it"] }),
      s("case", { name: "Anonymous client, three years out", scenario: "She tried to leave four times before she left. Each 'failure' actually built skills: a hidden bank account, copies of papers, a friend who knew the code word. The fifth time, she walked out with the kids and went straight to WEAVE. She still says: 'Every time I went back wasn't weakness. It was me learning what I needed to take with me.' Her CHW never once said 'why don't you just leave.' That's why she came back to ask for help the fifth time." }),
      s("discussion", { prompt: "Talk it through (only what you want to share):", questions: ["What does 'safety' mean to you right now — even if you're not in danger?", "What does NON-judgmental support sound like? What did you wish someone had said?", "If a friend told you about her relationship today, what would you actually say first?"] }),
      s("activity", { title: "Activity: The Layered Safety Plan (20 min)", instructions: "Whether this is for you, a loved one, or future client: build a 3-layer safety plan. Layer 1 (today, low-risk steps). Layer 2 (this month). Layer 3 (if you decide to leave). No layer is required to do the next." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your private safety plan (kept by you only)", "Three Sacramento numbers in your phone under disguised names", "A code word with one trusted person", "Permission to take this at YOUR pace"] }),
      s("outcome", { title: "You walk out today with…", items: ["The cycle named so you can see it", "Information about real local options", "A plan in YOUR control", "No pressure — and a door that stays open"] }),
      s("resources", { items: ["WEAVE Sacramento 24/7: 916-920-2952 (call or text)", "National DV Hotline: 1-800-799-7233 / text START to 88788", "My Sister's House (API focus): 916-428-3271", "Sacramento Family Justice Center: 916-875-4673"] })
    ]
  },

  "social-support": {
    title: "Building Your Support Circle",
    category: "relationships",
    duration: "2 hours",
    slides: [
      s("title", { title: "Building Your Support Circle", tagline: "Loneliness is a health risk. Connection is medicine." }),
      s("why", { hook: "Loneliness raises your risk of early death by 26% — about the same as smoking 15 cigarettes a day.", body: "Whether you came home from incarceration, recovery, or just a hard chapter, rebuilding a circle is harder than it sounds — and more important than people admit. Today we make it concrete." }),
      s("objectives", { items: ["Map your current support inventory honestly", "Identify gaps (who you don't have but need)", "Make ONE bid for connection this week", "Know where to find people who 'get it'"] }),
      s("concept", { title: "You need 5 different kinds of people", body: "ONE best friend isn't enough. Research shows we need: (1) someone to call at 3am, (2) someone fun, (3) someone older/wiser, (4) someone who shares your struggle (peer), (5) someone who needs YOU. Most adults have 1-2 of these. The job is naming the gaps." }),
      s("deepdive", { title: "How to actually make new friends as an adult", items: ["**Repetition:** same place, same time, same people = friendship (gym, meetings, classes, volunteering)", "**Bids:** small offers to connect — text, invite, share something. Most go ignored. Send anyway.", "**Shared work:** people bond doing something together, not staring at each other (hike, cook, build, serve)", "**Vulnerability ladder:** start small ('it's been a week'), see if they meet you, go deeper next time"] }),
      s("case", { name: "Marcus, 6 months home from prison", scenario: "Marcus said his support circle was 'my mom and my dog.' We mapped it: missing peer, mentor, and joy. He started showing up to a recovery meeting same time weekly, joined a basketball league, and reconnected with one cousin who'd written him inside. Eight months later: 7 people he could call, two he WOULD. He still says the meetings did more than therapy." }),
      s("discussion", { prompt: "Talk it through:", questions: ["Which of the 5 categories is most empty for you?", "What's stopped you from making bids? (pride, fear, time, history)", "Who's made a bid TOWARD you recently — that you didn't return?"] }),
      s("activity", { title: "Activity: The Circle Map + One Bid (20 min)", instructions: "Draw 5 circles labeled with the 5 categories. Write names where you have them; leave blank where you don't. Pick ONE blank — and write down a specific bid you'll make this week (text, invite, show up at a place where those people gather)." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your circle map (kept by you)", "ONE specific bid scheduled this week", "Three places to find people you don't have", "A return-bid you owe — and will make"] }),
      s("outcome", { title: "You walk out today with…", items: ["Honesty about who you have and don't", "One concrete connection plan", "Permission for connection to be slow", "Knowing this is a health move, not a luxury"] }),
      s("resources", { items: ["Meetup.com — search Sacramento + your interest", "Recovery meetings: aasacramento.org / sacramentona.org", "Volunteer Sacramento: handsonsacto.org", "211 — community group connections"] })
    ]
  },

  "healing-circles": {
    title: "Healing Circles & Restorative Practices",
    category: "relationships",
    duration: "2 hours",
    slides: [
      s("title", { title: "Healing Circles & Restorative Practices", tagline: "An ancient practice for repairing what punishment can't fix." }),
      s("why", { hook: "Punishment asks 'what rule did you break?' Restorative practice asks 'who got hurt and what do they need?'", body: "Whether you've been harmed, caused harm, or both (most of us are both), there's a way to talk about it that doesn't replay the wound. It's older than any court system. Today you sit in one." }),
      s("objectives", { items: ["Experience a circle as a participant", "Learn the four restorative questions", "Practice deep listening without fixing", "Identify a repair you might want to make (or receive)"] }),
      s("concept", { title: "The circle is the technology", body: "A circle is round on purpose: no head, no foot, no hierarchy. A talking piece passes — only the holder speaks. Everyone else listens. The container isn't magic. The structure is. It slows everything down enough to actually be heard." }),
      s("deepdive", { title: "The four restorative questions", items: ["**1. What happened?** (Story from each person's view, no debating)", "**2. Who was harmed and how?** (Including ripples — family, community, self)", "**3. What's needed to make it as right as possible?** (Concrete asks)", "**4. How do we move forward differently?** (Agreement)", "These work with kids, partners, communities — and with yourself."] }),
      s("case", { name: "A community circle in South Sacramento", scenario: "After a youth was jumped at a bus stop, the school did a restorative circle with the youth, the kid who hit him, both moms, and a community elder. The harmed boy got to say what he needed (apology in front of friends, walking buddy for two weeks). The boy who caused harm got to say WHY (he was being bullied, hadn't told anyone). Both mothers cried. Six months later, the boys weren't friends — but no one was scared on that bus." }),
      s("discussion", { prompt: "Today's circle prompt (talking piece will pass):", questions: ["A time someone really listened to you — what did it feel like?", "A repair you're carrying that you haven't made yet", "What you'd need to receive a repair from someone"] }),
      s("activity", { title: "Activity: Sit in a Circle (30 min)", instructions: "Today's group will form an actual circle. The talking piece will pass three times around. Round 1: name something that's heavy. Round 2: name what you need. Round 3: name what you'll carry forward. The CHW holds the space — not the outcome." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["What you noticed about being listened to (no fixing)", "A repair you might want to make — and to whom", "A repair you might want to receive — and from whom", "Whether a future facilitated circle might help"] }),
      s("outcome", { title: "You walk out today with…", items: ["Experience of being heard without interruption", "The four questions in your pocket", "Honesty about a repair you're carrying", "Knowing this exists if you ever need it"] }),
      s("resources", { items: ["Sacramento Mediation Center (offers restorative): sacmediation.org", "Impact Justice (national restorative): impactjustice.org", "The Little Book of Restorative Justice (Howard Zehr)", "Local healing circles: ask your CHW for current schedule"] })
    ]
  },

  // ============== CAREER ==============
  "career-exploration": {
    title: "Career Exploration: Strengths, Interests, Values",
    category: "career",
    duration: "2 hours",
    slides: [
      s("title", { title: "Career Exploration: Strengths, Interests, Values", tagline: "Stop applying to random jobs. Start aiming." }),
      s("why", { hook: "If you don't know what you want, every job feels like the wrong one — even when you get it.", body: "Today is NOT a personality test. It's a structured way to find work that won't crush your soul, fits your reality (childcare, transportation, record), and pays. We'll do this in three layers: strengths, interests, values." }),
      s("objectives", { items: ["Name 5 specific strengths (with proof)", "List 3-5 fields that interest you (and why)", "Define 5 non-negotiable work values", "Pick ONE target role to research this week"] }),
      s("concept", { title: "The right job sits where 3 circles overlap", body: "STRENGTHS (what you're good at — even from prison, parenting, or surviving). INTERESTS (what you actually want to learn). VALUES (what you won't compromise — schedule, dignity, distance). Most career advice picks one. We pick all three." }),
      s("deepdive", { title: "How to find each one", items: ["**Strengths:** ask 3 people 'when have you seen me at my best?' — patterns will appear", "**Interests:** what do you read about, watch videos about, or get nosy about? That's data.", "**Values:** sort these in priority — money, schedule flexibility, location, growth, meaning, stability, autonomy, team, reputation, physical work", "**Reality:** add YOUR constraints — childcare hours, public transit, record-friendly, no graveyard, etc."] }),
      s("case", { name: "Reggie, 41, came home with a forklift cert", scenario: "Reggie applied to 30 warehouse jobs. Got 2. Hated both. In session, we did this exercise. Strengths: he could de-escalate ANY situation (years inside). Interest: youth. Values: meaning, no graveyards. He pivoted: applied to youth-serving nonprofits as a peer mentor. Got hired in 5 weeks. Pay was less but turnover was low and he stayed 3 years before becoming a supervisor. Direction beat speed." }),
      s("discussion", { prompt: "Talk it through:", questions: ["When in your life — ANY part — have you been at your best? What were you doing?", "What's a 'job people don't think someone like me would do' that you actually want?", "What value would you NOT compromise even for $5/hr more?"] }),
      s("activity", { title: "Activity: The Three Circles (20 min)", instructions: "Draw three overlapping circles. Fill each: 5 strengths, 5 interests, 5 values. In the middle, write 1-3 specific job titles. If the middle is blank, that's information — we research more." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your three circles diagram", "ONE target role with title and 3 sample employers", "Three info-interview questions you'll ask someone in that field", "Your week's research plan (1 hour, structured)"] }),
      s("outcome", { title: "You walk out today with…", items: ["Self-knowledge in writing (not vibes)", "A specific target — not 'a job, any job'", "Permission to want what you want", "A research week, not 30 random apps"] }),
      s("resources", { items: ["O*NET online: onetonline.org (free, federal)", "California CareerZone: cacareerzone.org", "MyNextMove (interest test in 60 questions)", "California Conservation Corps (for fresh restart): ccc.ca.gov"] })
    ]
  },

    slides: [
      s("title", { title: "Interview Training: Confident & Honest", tagline: "Including: how to talk about your record, gaps, and hard chapters." }),
      s("why", { hook: "Most people lose the job in the first 90 seconds. Win those, and you're 80% there.", body: "Today you'll practice the answers to the 5 questions every interview asks (just in different words), AND the hardest one: 'tell me about your record / gap / firing.' Out loud. With feedback. Until it lands." }),
      s("objectives", { items: ["Master the STAR answer format", "Have a 60-second 'tell me about yourself'", "Have an honest, confident answer about gaps/record", "Ask 3 great questions back at the end"] }),
      s("concept", { title: "STAR > stories that wander", body: "Every behavioral question gets the same shape: SITUATION (set the scene briefly), TASK (your job), ACTION (what YOU did), RESULT (what happened, ideally with numbers). Same shape every time. Practice = automatic." }),
      s("deepdive", { title: "The hardest questions, scripted", items: ["**'Tell me about yourself':** 60 seconds — present, past, future. Where I am, what I've done, where I'm headed.", "**'Gap/record':** 'From 2018-2023 I was incarcerated. I used that time to [GED, certs, programs]. I'm here because I want [specific contribution]. Happy to answer questions.'", "**Weakness:** real one + what you do about it. Never 'I work too hard.'", "**Why us?:** Did your homework. Mention something specific from their site/news.", "**Your questions:** 'What does success look like at 90 days?' 'What's the team like?' 'What's next if this goes well?'"] }),
      s("case", { name: "Anthony, interviewing for a customer service role", scenario: "Anthony was sweating before his mock interview. He'd been turned down 8 times. Watching the recording, he saw it: he apologized for his record before they asked, got tense, lost the room. We rebuilt it: he led with his strengths, mentioned his record matter-of-factly when asked, and pivoted forward. Two weeks later he landed the role. The record didn't change. The DELIVERY did." }),
      s("discussion", { prompt: "Talk it through:", questions: ["Which question scares you most? Why?", "What's a TRUE strength of yours that you minimize?", "How do you talk yourself OUT of jobs you'd be good at?"] }),
      s("activity", { title: "Activity: Mock Interview (30 min)", instructions: "Live mock interview with your CHW: 5 questions, recorded if you consent. Then we watch together. Body language, pace, eye contact, words. ONE thing to change. Re-record. Watch the change happen." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your scripted 60-second intro", "Your honest gap/record answer", "Three STAR stories ready (challenge, conflict, win)", "Three questions to ask THEM"] }),

      s("resources", { items: ["Big Interview (free trial): biginterview.com", "Glassdoor — read interview reviews of specific companies", "Sacramento Works mock interview support: 916-617-5959", "YouTube: 'Linda Raynier interview' channel (free, excellent)"] })

  "professionalism": {
    title: "Professionalism: Showing Up Right",
    category: "career",
    duration: "2 hours",
    slides: [
      s("title", { title: "Professionalism: Showing Up Right", tagline: "The first 90 days decide the next 5 years." }),
      s("why", { hook: "More people lose jobs in the first 90 days for HOW they showed up than for WHAT they did.", body: "Punctuality, communication, attitude — these aren't extras. They're the actual job. Today: the unwritten rules nobody told you, decoded." }),
      s("objectives", { items: ["Master the 4 punctuality rules", "Write a professional email in under 5 minutes", "Handle workplace communication situations 5 ways", "Build a 90-day plan for any new job"] }),
      s("concept", { title: "Professional = predictable", body: "Being professional isn't being fake. It's being PREDICTABLE — your boss can count on you to show up, follow through, communicate, and not bring drama. That's it. Boring is gold." }),
      s("deepdive", { title: "The unwritten rules", items: ["**Time:** 10 minutes early = on time. On time = late. Late = problem. Always. Even one time.", "**Communication:** if you'll be late, text BEFORE shift, not during. 'Running 8 min late, sorry' — done.", "**Email:** subject line, greeting, brief body, sign-off, name. Even short emails. Always.", "**Conflict:** never on company channels. Never on text. Always face-to-face or scheduled.", "**Mistakes:** own fast, fix faster, don't blame. 'I missed it. Fixing now. Won't repeat.'"] }),
      s("case", { name: "Crystal's first 30 days", scenario: "Crystal was hired at a healthcare clinic — first job in 4 years. Week 1 she was 5 minutes late twice (no text), wore something that didn't match the dress code, and complained about a coworker on Slack. Her supervisor pulled her aside. She thought she was getting fired. Instead her supervisor handed her this exact lesson. Crystal learned. Two years later she was promoted. The pull-aside was the gift, not the warning." }),
      s("discussion", { prompt: "Talk it through:", questions: ["Which rule is hardest for you — and what's underneath that?", "What's a workplace 'thing' nobody told you that you wish they had?", "Who in your life models this well?"] }),
      s("activity", { title: "Activity: Email Lab + Tough Scenario (25 min)", instructions: "Write 3 real emails: (1) telling your boss you'll miss work tomorrow, (2) asking for a schedule change, (3) following up after an interview. Then role-play one tough scenario: a coworker took credit for your work — what do you do?" }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Three email templates saved on your phone", "Your morning routine for on-time arrival", "A 90-day plan for any new role you start", "One rule you'll commit to perfecting"] }),
      s("outcome", { title: "You walk out today with…", items: ["Specific scripts, not 'be more professional'", "An on-time system that works for YOUR life", "Confidence about workplace situations", "Permission to ask 'is this how it works here?'"] }),
      s("resources", { items: ["Grammarly (free) — for email proofing", "Sacramento Works workshops: 916-617-5959", "'The Unspoken Rules' by Gorick Ng (book)", "Indeed Career Guide articles: indeed.com/career-advice"] })
    ]
  },

  "workplace-rights": {
    title: "Workplace Rights: Know Yours",
    category: "career",
    duration: "2 hours",
    slides: [
      s("title", { title: "Workplace Rights: Know Yours", tagline: "California has the strongest worker protections in the country. Use them." }),
      s("why", { hook: "If you don't know your rights, you don't have them.", body: "Wage theft, illegal firing, harassment, retaliation — these happen every day in CA. Today: the rights you have, how to spot violations, and where to call when something's wrong (it's free)." }),
      s("objectives", { items: ["Know CA minimum wage and overtime rules cold", "Recognize the top 5 wage theft tactics", "Understand at-will vs wrongful termination", "Know the EXACT phone numbers to call"] }),
      s("concept", { title: "At-will doesn't mean lawless", body: "California is at-will: they can fire you for any reason — OR no reason. BUT they cannot fire you for an ILLEGAL reason: race, gender, disability, pregnancy, retaliation for reporting, etc. That's where you have power." }),
      s("deepdive", { title: "Your CA rights, fast", items: ["**Minimum wage 2026:** $16.50/hour state minimum (Sacramento may be higher — check)", "**Overtime:** 1.5x after 8 hrs/day or 40 hrs/week. 2x after 12 hrs/day. ALL employees, even salaried under $66,560.", "**Breaks:** 10 min paid rest every 4 hrs + 30 min unpaid meal at 5 hrs", "**Wage theft red flags:** off-the-clock work, no pay stub, paid in cash with no records, 'salaried' under threshold to skip OT", "**Sick leave:** at least 5 days/year paid in CA — at every job"] }),

      s("deepdive", { title: "Common cliffs in CA", items: ["**Medi-Cal:** ends ~138% federal poverty line for adults (~$1,800/mo single, ~$3,800/mo family of 4)", "**CalFresh:** generally ends at 200% FPL", "**CalWORKs childcare:** transitions through stages — Stage 3 cliffs around $5,000/mo family of 3", "**Section 8 housing:** rent goes up as income goes up (30% rule), but you usually don't lose it for a small raise", "**Covered CA subsidies:** taper, don't cliff — that's good news above Medi-Cal"] }),
      s("case", { name: "Maria's bridge plan", scenario: "Maria was offered a $2/hr raise that would push her over the Medi-Cal limit. Old her would've taken it and gotten crushed. New her: counted the raise = $320/mo, counted the loss = Medi-Cal worth $400/mo + childcare cliff $300/mo. Net = -$380/mo. We negotiated: she took the raise but increased pretax retirement contribution to stay under the line — for 6 months, while building savings. Then she crossed the cliff with a buffer. No crash." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What benefits do you receive — and what's the limit you've never checked?", "Have you ever turned down work to keep benefits? Be honest.", "What would a 'cliff bridge' need to look like for you to feel safe?"] }),
      s("activity", { title: "Activity: Cliff Map (25 min)", instructions: "List every benefit you receive. Look up (or we look up) the income limit. Calculate your current monthly buffer between income and limit. Plan: (a) max pretax savings to stay under, OR (b) target raise + savings buffer to clear the cliff." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your benefits + cliff limits in writing", "Your monthly buffer calculated", "A bridge plan (savings + timing)", "Knowing this isn't 'gaming' — it's planning"] }),
      s("outcome", { title: "You walk out today with…", items: ["The cliff named — not feared", "Real numbers for YOUR situation", "A bridge plan", "Permission to make smart, legal moves"] }),
      s("resources", { items: ["Benefits.gov calculator", "Sacramento County DHA: 916-874-3100", "Cal-EITC4Me income/benefits planner: caleitc4me.org", "Local United Way 211 cliffs counseling"] })
    ]

  "saving-systems": {
    title: "Saving Systems: Emergency Fund Ladder",
    category: "financial",
    duration: "2 hours",
    slides: [
      s("title", { title: "Saving Systems: Emergency Fund Ladder", tagline: "$500 saved breaks the poverty cycle. We're not kidding." }),
      s("why", { hook: "78% of Americans live paycheck to paycheck. The ones who don't usually started with one $500 buffer.", body: "An emergency fund isn't about getting rich. It's about not having to choose between a flat tire and dinner. Today: a five-step ladder from $0 to a real cushion." }),
      s("objectives", { items: ["Set up automatic transfers (the ONE move that works)", "Pick your first ladder rung ($100, $500, $1k, $2k, 3 months)", "Separate savings from spending (different bank)", "Plan for the inevitable raid — and rebuild"] }),
      s("concept", { title: "Automation > willpower", body: "Anyone who tells you to save 'what's left at the end of the month' has never been broke. Pay yourself FIRST. Auto-transfer the day your check hits. Make it invisible. You spend what you see — so don't see it." }),
      s("deepdive", { title: "The five-rung ladder", items: ["**Rung 1 — $100:** covers most car repairs and out-of-network ER copays. Most people skip this and shouldn't.", "**Rung 2 — $500:** covers major car/dental/appliance. Statistically the cycle-breaker.", "**Rung 3 — $1,000:** Dave Ramsey starter. Buys you decision-making space.", "**Rung 4 — $2,000:** rent-and-bills cushion (most CA areas)", "**Rung 5 — 3-6 months expenses:** the real safety net. Years of work, but real."] }),
      s("case", { name: "Anthony hit Rung 2 in 8 months", scenario: "Anthony made $2,800/mo, was sure he 'couldn't save anything.' We set up $25/week auto-transfer to a separate bank he didn't have an app for. He had to call to pull money — friction = savings. Month 4 his alternator died. He pulled $260, fixed the car, kept his job. Old Anthony would've borrowed at 200% APR. New Anthony rebuilt to $500 in 6 more months. Cycle. Broken." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What's the biggest 'small' emergency that's wrecked your finances?", "What's stopped you from saving — REALLY (not 'no money', specifically)?", "Which rung sounds doable in 90 days?"] }),
      s("activity", { title: "Activity: Set Up the Auto-Transfer (25 min)", instructions: "Open a SEPARATE savings account (different bank ideally). Set up auto-transfer for the day after payday — even $5/week. Delete that bank's app from your phone. Friction is the feature." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["A separate savings account opened", "Auto-transfer set to a real dollar amount", "Your first rung target + timeline", "A 'rebuild' rule for after you raid it"] }),
      s("outcome", { title: "You walk out today with…", items: ["A working savings system", "A target with a date", "Friction working FOR you", "Knowing $5/week is enough to start"] }),
      s("resources", { items: ["Ally, Marcus, Capital One 360 (high-yield savings online)", "Chime auto-save round-ups", "Sacramento Credit Union savings accounts", "America Saves week resources: americasaves.org"] })
    ]
  },

  "taxes-basics": {

    duration: "2 hours",
    slides: [
      s("title", { title: "Taxes Basics + Free Filing", tagline: "Stop paying $300 to file what you can do free in 45 minutes." }),
      s("why", { hook: "Low-income filers leave an average of $1,700 in tax credits unclaimed every year — money that's already yours.", body: "Today: how to file free, what credits to claim (EITC, CTC, CalEITC), the difference between W-2 and 1099 (it matters), and how to avoid the predatory tax-prep storefronts." }),
      s("objectives", { items: ["Know if you must file (you usually should — refund money)", "Identify which free filing service fits you", "Claim EITC + CalEITC + CTC if eligible", "Understand W-2 vs 1099 and what 1099 actually costs"] }),
      s("concept", { title: "Refund > avoidance", body: "Most low-income workers GET money back from taxes — they don't owe. Not filing means giving up that money. The IRS is not coming for refunds you didn't claim. That's just lost cash." }),
      s("deepdive", { title: "What you need to know", items: ["**EITC (federal):** up to $7,430 if you have kids. Even single workers without kids: up to $632.", "**CalEITC + Young Child Tax Credit:** CA-only, stackable with federal. CalEITC up to $3,529.", "**Free file:** VITA (in-person, Sacramento Library), MyFreeTaxes, FreeTaxUSA, IRS Direct File", "**1099 reality:** YOU pay both halves of FICA = ~15% off the top + no benefits. Quote 35-50% higher than W-2 to break even.", "**Quarterly estimates:** if 1099, you OWE quarterly. Get caught up or face penalties."] }),
      s("case", { name: "Linda's first VITA visit", scenario: "Linda thought she didn't need to file — she made $19k. A VITA volunteer prepared her return: federal EITC $3,900, CalEITC $1,800, Young Child Tax Credit $1,000, federal Child Tax Credit $2,000 = $8,700 refund. She'd been not-filing for 3 years. We pulled prior years too. Total recovered: $24,000. Her family caught up on rent, paid 2 dental bills, and started savings. The most expensive thing she'd ever done was NOT file." }),
      s("discussion", { prompt: "Talk it through:", questions: ["When did you last file? What stopped you in years you didn't?", "Have you ever been charged $300+ for a return that should've been free?", "What would a $3,000-8,000 refund mean for you THIS year?"] }),
      s("activity", { title: "Activity: Filing Plan (25 min)", instructions: "Pull up MyFreeTaxes.com or schedule a VITA appointment at sacramento.gov/csbg. Gather your needed docs (W-2s, ID, kids' SSNs). If you missed prior years — we plan those too (you can go back 3 years and still claim refunds)." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["A scheduled VITA appointment OR a free-file account opened", "Your doc checklist with locations of each", "A list of credits you're likely eligible for", "A back-file plan if you missed years"] }),
      s("outcome", { title: "You walk out today with…", items: ["A path to claim what's yours", "Free filing tools (no $300 storefront)", "Awareness of CA-specific credits", "A back-file plan if needed"] }),
      s("resources", { items: ["VITA Sacramento (free in-person): 211 to schedule", "MyFreeTaxes.com (free online, United Way)", "FreeTaxUSA (free federal, $15 state)", "CalEITC4Me: caleitc4me.org"] })
    ]
  },

    duration: "2 hours",
    slides: [
      s("title", { title: "Fraud & Scam Prevention", tagline: "If they're rushing you, they're scamming you. Period." }),
      s("why", { hook: "$10 billion was stolen from Americans in 2024 — and the fastest-growing target is people experiencing reentry, recovery, or financial stress.", body: "Scammers count on shame, urgency, and isolation. Today we replace those with knowledge, time, and a phone-a-friend rule." }),
      s("objectives", { items: ["Recognize the 6 most common scams targeting our community", "Know the ONE rule (never act in 24 hours)", "Set up free credit freezes at all 3 bureaus", "Know exactly where to report and recover"] }),
      s("concept", { title: "Urgency = scam", body: "Real institutions DO NOT rush you. The IRS doesn't call. Police don't take Apple gift cards. A 'job' doesn't ask for $300 for 'training.' If urgency is the pitch, the answer is no — and 24 hours of thinking time." }),
      s("deepdive", { title: "The 6 scams to know cold", items: ["**Job scam:** 'pay for training/equipment first' — real jobs PAY YOU.", "**Romance scam:** met online, never in person, suddenly needs money.", "**Government impersonation:** IRS, SSA, sheriff — they don't call demanding gift cards or wire transfers. Hang up.", "**Phishing:** fake bank/Cash App/Amazon texts. Don't click. Open the app fresh.", "**Reload pack scam:** 'send me the numbers off this card to fix [problem]'", "**Predatory loans:** payday/title loans (200%+ APR) and refund-anticipation loans."] }),
      s("case", { name: "Marcus and the 'sheriff'", scenario: "Marcus got a call: 'You missed jury duty, warrant out, $1,200 fine, pay in Apple gift cards within 4 hours or we arrest.' In old life he might have panicked. Instead he hung up, called us, we called the actual sheriff: not a thing. Marcus then called his bank and put a freeze on his cards. Three weeks later the same scammers tried again. Same answer. The pause saved him $1,200." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What's the closest you've come to falling for a scam?", "Who in your family is most at risk — and how can you help?", "What does 'urgency' feel like in your body? That feeling IS the alarm."] }),
      s("activity", { title: "Activity: Credit Freeze + Phone Cleanup (25 min)", instructions: "Free credit freezes at Equifax, Experian, TransUnion (we do all 3 today). Then we clean your phone: block known scam-text numbers, turn on iPhone/Android scam call screening, save FTC + 211 in your phone." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Three credit bureaus frozen", "A '24-hour pause' rule written down", "FTC + sheriff non-emergency in phone", "A trusted person to call before any 'urgent' financial decision"] }),
      s("outcome", { title: "You walk out today with…", items: ["The 6 scams memorized", "Active credit freezes", "The 24-hour rule installed", "A scam-loss recovery plan if it ever happens"] }),
      s("resources", { items: ["FTC report: reportfraud.ftc.gov", "AARP Fraud Watch: 877-908-3360", "CA AG consumer hotline: 800-952-5225", "Identity theft recovery: identitytheft.gov"] })
    ]
  },

  "consumer-skills": {
    title: "Consumer Skills: Stop the Leaks",
    category: "financial",
    duration: "2 hours",
    slides: [
      s("title", { title: "Consumer Skills: Stop the Leaks", tagline: "The average household leaks $200-400/month. Find yours." }),
      s("why", { hook: "It's not the income — it's the leaks. Subscriptions, fees, impulse buys, brand markups. Find them, plug them, free the money for what matters.", body: "Today is a leak-hunt. We're not going to tell you to stop the daily coffee. We ARE going to find $100-300/month you didn't know you were spending." }),
      s("objectives", { items: ["Audit every subscription on your phone + bank", "Identify the 3 brand traps you fall for", "Master the 'price per use' question", "Cancel ONE leak today"] }),
      s("concept", { title: "Three leak categories: subscriptions, brand premium, impulse", body: "SUBSCRIPTIONS bleed slow ($9.99 here, $14.99 there). BRAND PREMIUM is paying 2-3x for the name. IMPULSE happens at checkout. All three are fixable WITHOUT becoming joyless. We're hunting fat, not muscle." }),
      s("deepdive", { title: "How to find each leak", items: ["**Subscription audit:** check Apple/Google subscriptions (most apps), then bank statement for monthly recurrings. Average household has 12 active subs, uses 3.", "**Brand premium:** generic groceries save 25-40%, store-brand OTC meds same active ingredient, $20 jeans last as long as $80 ones for most uses", "**Impulse:** add to cart, wait 24 hours, then decide. Cuts impulse 60%.", "**Price per use:** $80 thing used 200 times = $0.40/use (great). $80 thing used twice = $40/use (terrible)."] }),
      s("case", { name: "Marisol's $213 leak", scenario: "Marisol said she 'lived tight.' We did the audit. Subscriptions: $89/month she didn't know was running (Netflix, Hulu, Spotify family she paid for adult kids, an old gym). Brand premium: $60/mo on name-brand groceries. Impulse: $64 in last month's Amazon she didn't remember. Total leak: $213/month = $2,556/year. She killed half. Used the savings to start an emergency fund. Same income, totally different life." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What subscription do you bet you have that you don't use?", "What brand do you pay extra for — and why? (No judgment, real reasons.)", "What's the last impulse buy you regret?"] }),
      s("activity", { title: "Activity: The Live Audit (30 min)", instructions: "Phone out. Apple → Settings → Subscriptions. Google Play → Subscriptions. Then bank statement, scroll through last month's recurring charges. List every one. Cancel at least ONE on the spot." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your full leak audit (real numbers)", "At least 1 subscription canceled today", "Your '24-hour cart rule' for impulse", "A monthly leak-check date set on calendar"] }),
      s("outcome", { title: "You walk out today with…", items: ["Real numbers on your real leaks", "$50-200/month found", "Permission to KEEP what matters", "Skills your kids will inherit"] }),
      s("resources", { items: ["Rocket Money (free subscription tracker app)", "Trim (free, finds and cancels for you)", "Honey browser extension (auto coupon)", "PriceCharting / CamelCamelCamel (Amazon price history)"] })
    ]
  },

  "money-mindset": {
    title: "Money Mindset: Stop the Spiral",
    category: "financial",
    duration: "2 hours",
    slides: [
      s("title", { title: "Money Mindset: Stop the Spiral", tagline: "Money stress isn't about math. It's about safety." }),
      s("why", { hook: "Financial stress is the #1 cause of relapse, divorce, and stress-related illness. It's also the most under-treated.", body: "If you grew up scarce, money feels like air running out. If you've been broke, every dollar feels like life or death. That's a nervous system response. Today: tools to calm the system AND make better decisions." }),
      s("objectives", { items: ["Name your money story (where it came from)", "Spot the 4 trauma money patterns", "Use the 24-hour pause for any decision over $50", "Build ONE money ritual that calms you"] }),
      s("concept", { title: "Money stories live in the body", body: "If your parents fought about money, you may freeze when bills come. If you went hungry, you might over-spend on food. If you've been controlled financially, you might hide money or refuse to plan. None of this is 'bad with money' — it's a nervous system pattern. Patterns can change." }),
      s("deepdive", { title: "The four trauma patterns", items: ["**Avoidance:** can't open mail, won't check bank. Fix: 5-min Friday check-ins, with a snack or calm music.", "**Hoarding:** save everything, terrified to spend. Fix: a 'permission to use' line item in budget.", "**Boom-bust:** windfall = spree. Fix: 24-hour rule + 'savings first' on any extra income.", "**Self-sabotage:** finally have money, blow it. Fix: name the discomfort of having — it's real for a lot of survivors."] }),
      s("case", { name: "Anthony's avoidance", scenario: "Anthony hadn't opened his mail in 6 months. Late fees, two collections, almost lost insurance. We started Friday Money Hour: 30 min, coffee, with his CHW on speaker. Open mail, sort, plan one action. Week 1: just opened. Week 4: bills sorted. Month 3: caught up. Month 6: ahead of every bill for the first time ever. The shame went DOWN as the action went up." }),
      s("discussion", { prompt: "Talk it through (only what you want to share):", questions: ["What's a money memory from childhood that still affects you?", "Which trauma pattern feels most familiar?", "What's a money decision you've made that you can see now was the pattern, not you?"] }),
      s("activity", { title: "Activity: Your Money Story + One Ritual (25 min)", instructions: "Write your money story in 5 sentences (childhood, hardest chapter, biggest fear, biggest hope, what you want to pass to next generation). Then design ONE money ritual: when, where, with what (music, food, person). Schedule it." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your written money story (kept by you)", "Your trauma pattern named", "ONE money ritual scheduled (recurring)", "A 24-hour pause rule written"] }),
      s("outcome", { title: "You walk out today with…", items: ["Self-compassion replacing shame", "Tools to calm the system", "A ritual that makes money less scary", "Permission for money to be a tool — not a test"] }),
      s("resources", { items: ["The Financial Anxiety Solution (book, Lindsay Bryan-Podvin)", "Therapy for Black Girls / Latinx Therapy (money-focused therapists)", "Bari Tessler's 'The Art of Money' (book)", "211 — for free financial counseling AND mental health"] })
    ]
  },

      s("title", { title: "Environmental Hazards: Mold, Lead, Pests, Air", tagline: "Your home is making you sick — or it isn't. Today you find out which." }),
      s("why", { hook: "1 in 4 homes in low-income neighborhoods has a major hazard. Most tenants never know — or know and don't know their rights.", body: "Mold, lead, roaches, bad air — these cause asthma, learning delays, and chronic illness. They're also fixable. CA has strong tenant protections. Today: how to spot, document, demand, and escalate." }),
      s("objectives", { items: ["Recognize the 5 most common hazards", "Document hazards properly (date, photo, witness)", "Know the 'habitability' law and what it covers", "Send a written request that legally protects you"] }),
      s("concept", { title: "Habitability is the law", body: "Under CA Civil Code 1941, your landlord MUST provide working plumbing, heat, weatherproofing, no infestations, no major hazards. You have the right to repair-and-deduct, withhold rent (carefully), or break lease for serious uncured issues. But you must FOLLOW the process." }),
      s("deepdive", { title: "Hazards + how to address each", items: ["**Mold:** dark patches, musty smell, allergies that vanish when you leave. Photo, sample if possible, written notice within 24 hours.", "**Lead:** any home built before 1978. Free testing through county. Critical with kids under 6.", "**Roaches/rodents:** infestation = legal violation. Document with date-stamped photos, written demand, then 211 / Code Enforcement.", "**Air quality:** wildfire smoke is a CA reality. HEPA filter ($30) + N95 masks + AirNow.gov.", "**Process:** WRITE everything (text or email). Verbal complaints don't count legally."] }),
      s("case", { name: "The Sanchez family", scenario: "Two kids with worsening asthma. We did a home walkthrough, found mold behind the fridge and in the bathroom. Wrote a dated email to landlord with photos. Landlord ignored. Filed with Sacramento Code Enforcement. Within 30 days: full remediation. Kids' asthma improved 70% in 3 months. Same apartment. Same kids. Different air. Documentation made it legal — and got it done." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What hazards have you suspected in your home but didn't address?", "What stops most tenants from reporting? (fear of eviction, language, time)", "What would feel safe enough to push for repairs?"] }),
      s("activity", { title: "Activity: Home Hazard Walk-Through (25 min)", instructions: "Pull out phone. We walk through your space mentally (or with photos): kitchen, bathroom, bedrooms, ventilation, windows, walls. Note ANY of the 5 hazards. For any found: draft a dated written request to send tonight." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your hazard inventory with photos saved", "A written request drafted (and sent)", "Code Enforcement number saved in phone", "Tenants Together hotline saved"] }),
      s("outcome", { title: "You walk out today with…", items: ["A real hazard map of your home", "Documentation started", "The exact legal process to follow", "Power to demand the home you're paying for"] }),
      s("resources", { items: ["Sacramento Code Enforcement: 311 or 916-264-5011", "Tenants Together: tenantstogether.org / 888-495-8020", "Sacramento Self-Help Legal: 916-875-3400", "AirNow.gov for daily air quality"] })
    ]
  },

  "values-discovery": {
    title: "Values Discovery: What Actually Matters",
    category: "legacy",
    duration: "2 hours",
    slides: [
      s("title", { title: "Values Discovery: What Actually Matters", tagline: "When you know what you value, hard choices get easier." }),
      s("why", { hook: "If you don't know what you value, every decision feels like a referendum on your worth.", body: "Values are the compass underneath your goals. Today we name yours — not the ones you were taught, the ones that are actually true for you now." }),
      s("objectives", { items: ["Name your top 5 values from a list of 60", "Test each value against a real recent decision", "Spot which values are in conflict (everyone has some)", "Write a one-sentence values statement"] }),
      s("concept", { title: "Values are verbs, not nouns", body: "A value isn't 'family' — it's 'showing up for the people I chose.' Not 'success' — it's 'building things that outlast me.' Verbs make values testable. They give you something to actually do tomorrow." }),
      s("deepdive", { title: "How values actually work", items: ["**Values are revealed by behavior**, not stated in words. Look at where your time and money go.", "**Two values often conflict** (freedom vs security, ambition vs presence). That's normal — knowing it lets you choose on purpose.", "**Values shift with seasons.** What mattered at 22 may not matter at 42. Re-do this exercise every few years.", "**You can't 'should' your way into a value.** If it's not true, it won't hold under stress."] }),
      s("case", { name: "Reggie, 38, year 2 home", scenario: "Reggie came in saying his goal was 'get rich.' We did the values work. Underneath 'rich' was: 'never feel powerless again' and 'be the dad my dad wasn't.' Those are different goals than rich. He shifted from chasing a hustle to a stable union job and weekly time with his kids. A year later: more money than the hustle would've made, plus a relationship with his daughter. The values were the unlock." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What's a value you were taught that doesn't fit you anymore?", "Where do your time and money actually go (be honest)?", "Which two of your values pull against each other?"] }),
      s("activity", { title: "Activity: The 60→5 Sort (25 min)", instructions: "We hand you a sheet of 60 value words. Cross out 30 you don't care about. Of the remaining 30, pick 15. Of those 15, pick 10. Of those 10, your top 5. The cuts get hard on purpose. That's where the truth lives." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your top 5 values (verbs)", "Your one-sentence values statement", "ONE decision this week your values will guide", "Which two values conflict — and which wins this season"] }),
      s("outcome", { title: "You walk out today with…", items: ["Your top 5 values, in writing", "Language for what's been driving you all along", "A test for future hard decisions", "Permission to outgrow old values"] }),
      s("resources", { items: ["Values card sort (free download): thinkavellaka.com/values", "Designing Your Life by Bill Burnett (book — Sac library)", "Acceptance and Commitment Therapy values worksheets: contextualscience.org", "Your CHW for follow-up sessions"] })
    ]

  "goal-ladders": {
    title: "Goal Ladders: Big Dreams, Small Rungs",
    category: "legacy",
    duration: "2 hours",
    slides: [
      s("title", { title: "Goal Ladders: Big Dreams, Small Rungs", tagline: "The dream stays a dream until you can see Monday's step." }),
      s("why", { hook: "75% of New Year's resolutions die by February — not because people are weak, because the steps were too big.", body: "A goal ladder breaks a 5-year dream into a Monday-morning move. Today: build one ladder, all the way down to what you can do in the next 24 hours." }),
      s("objectives", { items: ["Pick ONE goal (and only one)", "Build a 5-year → 1-year → 90-day → this week → tomorrow ladder", "Identify the FIRST domino — the smallest possible move", "Set a check-in cadence with your CHW"] }),
      s("concept", { title: "The 5-1-90-7-1 ladder", body: "Big goal at the top. 1-year version of it underneath. 90-day version under that. This-week version. Then ONE thing for tomorrow. The dream doesn't get smaller — the steps do." }),
      s("deepdive", { title: "Where ladders break", items: ["**Skipping rungs:** 'I'll start a business' with no 1-year plan = anxiety, not action", "**Vague rungs:** 'work on it' isn't a step. 'Email Maria by Thursday' is.", "**Solo rungs:** every ladder needs a witness — your CHW, a friend, anyone", "**No celebration rungs:** mark each rung. Brain needs the dopamine to keep going.", "**Plan B rungs:** when life hits, what's the smaller version you can still do?"] }),
      s("case", { name: "Marcus, 52, goal: own a barbershop", scenario: "Marcus came home with that dream and zero clue how to start. We built the ladder. 5-year: own shop. 1-year: licensed barber + $5K saved. 90-day: enrolled at MTI College + open savings account. This week: tour MTI + bring ID to bank. Tomorrow: call MTI for tour appointment. He made the call that afternoon. Two years later: cutting hair at a shop, $4K saved, on the path. The dream didn't shrink. The first step did." }),
      s("discussion", { prompt: "Talk it through:", questions: ["What's a goal you've started and stopped 3+ times? What rung was missing?", "Who's your witness — the person you'd be embarrassed to lie to about progress?", "What's your real Plan B if life hits hard?"] }),
      s("activity", { title: "Activity: Build YOUR Ladder (30 min)", instructions: "On the worksheet: write your big goal at the top. Then 1-year, 90-day, this-week, tomorrow. Read each rung — does it feel like a real step? If not, break it smaller. Show your CHW. They'll push you to specifics." }),
      s("worksheet", { title: "Your 1-on-1 Hour", items: ["Your full ladder (5 rungs minimum)", "ONE first domino — done in next 24 hours", "Your witness — who, when, how often", "Plan B if life hits"] }),
      s("outcome", { title: "You walk out today with…", items: ["A real ladder for ONE goal", "Tomorrow's exact move", "An accountability witness", "Confidence that this dream can actually move"] }),
      s("resources", { items: ["Atomic Habits by James Clear (Sac library has copies)", "Notion or Google Sheets for tracking (free)", "Life House CHW for 90-day check-ins", "211 for goal-specific resources (housing, school, work)"] })
    ]
  },
